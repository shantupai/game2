<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ארנב הלייזר - הרפתקת הטיפוס</title>
    <style>
        body { margin: 0; background: #020617; color: white; font-family: system-ui, sans-serif; overflow: hidden; }
        canvas { display: block; margin: 0 auto; background: #0f172a; border-bottom: 5px solid #10b981; }
        #ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; font-size: 24px; font-weight: bold; pointer-events: none; text-shadow: 2px 2px 4px #000; z-index: 10; }
        #boss-ui { color: #f87171; display: none; text-align: center; }
        #riddle-container {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; color: black; padding: 30px; border-radius: 20px; text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8); z-index: 100; max-width: 400px;
        }
        #riddle-container button {
            display: block; width: 100%; margin: 10px 0; padding: 10px; font-size: 18px;
            cursor: pointer; background: #10b981; color: white; border: none; border-radius: 8px;
        }
        #riddle-container button:hover { background: #059669; }
        .controls { position: absolute; bottom: 10px; width: 100%; text-align: center; color: #94a3b8; font-size: 18px; }
    </style>
</head>
<body>
    <div id="ui">
        <div>🚀 שלב: <span id="lvl">1</span></div>
        <div id="boss-ui">👾 גיגה-בוס: <span id="bhp">100</span>%</div>
        <div>✨ כוכבים: <span id="sc">0</span></div>
    </div>
    
    <div id="riddle-container">
        <h2 id="riddle-question">חידה!</h2>
        <div id="riddle-answers"></div>
    </div>

    <div class="controls">חצים: תנועה וטיפוס | רווח: קפיצה / קפיצת קיר | F: לייזר</div>
    <canvas id="g"></canvas>

<script>
    const canvas = document.getElementById('g'), ctx = canvas.getContext('2d');
    canvas.width = 1100; canvas.height = 550;

    let level = 1, score = 0, bullets = [], lastDir = 1;
    let currentLevelData = null, gameActive = true, riddlesSolved = 0;
    
    const player = { 
        x: 50, y: 400, w: 35, h: 40, 
        xv: 0, yv: 0, speed: 7, jump: 13, grav: 0.6,
        onWall: false, wallDir: 0, isClimbing: false
    };
    const keys = {};

    const riddleBank = [
        { q: "מה יש לו שיניים אבל לא יכול לנשוך?", a: ["כלב", "תפוח", "מסרק"], c: 2 },
        { q: "מה עולה למעלה אבל אף פעם לא יורד?", a: ["בלון", "הגיל שלך", "מטוס"], c: 1 },
        { q: "איזה חודש בשנה יש בו 28 ימים?", a: ["פברואר", "כולם", "מרץ"], c: 1 },
        { q: "מפתחות ללא מנעול, רווח ללא מקום, אתה יכול להיכנס אבל לא לצאת. מה אני?", a: ["ספר", "בית", "מקלדת"], c: 2 }
    ];

    function createLevel(n) {
        const isBoss = n % 10 === 0;
        document.getElementById('boss-ui').style.display = isBoss ? 'block' : 'none';
        bullets = [];
        riddlesSolved = 0;
        
        let data = {
            isBoss: isBoss, bossHp: 500, maxBossHp: 500,
            plats: [
                {x: 0, y: 530, w: 1100, h: 20}, // רצפה
                {x: 350, y: 150, w: 30, h: 300}, // קיר טיפוס 1
                {x: 700, y: 100, w: 30, h: 300}, // קיר טיפוס 2
            ],
            aliens: [],
            carrot: { x: 500, y: 100, w: 30, h: 40, collected: false },
            door: { x: 1020, y: 450, w: 60, h: 80, open: false }
        };

        if (isBoss) {
            data.boss = { x: 450, y: 100, w: 220, h: 220, s: 3, d: 1 };
            data.plats = [{x: 0, y: 530, w: 1100, h: 20}]; 
            data.carrot.collected = true; // אין חידה בשלב בוס
            data.door.open = true;
        } else {
            // הוספת מדרגות
            data.plats.push({x: 100, y: 400, w: 150, h: 20}, {x: 850, y: 300, w: 150, h: 20});
            // חייזרים
            for(let i=0; i < Math.min(n, 4); i++) {
                data.aliens.push({x: 150 + (Math.random() * 800), y: 495, curX: 0, r: 100, s: 2.5, d: 1, alive: true});
            }
            data.aliens.forEach(a => a.curX = a.x);
        }
        return data;
    }

    currentLevelData = createLevel(level);

    window.onkeydown = e => { 
        keys[e.code] = true;
        if (!gameActive) return;

        if (e.code === 'Space' || e.code === 'ArrowUp') {
            if (player.onWall && !player.isClimbing) {
                // קפיצת קיר הצידה
                player.yv = -player.jump * 0.9;
                player.xv = -player.wallDir * 12;
                player.onWall = false;
            } else if (!player.onWall) {
                // קפיצה רגילה (רק אם על הרצפה - הפשטה בשביל הטיפוס)
                if(player.yv === 0) player.yv = -player.jump;
            }
        }
        if(e.code === 'KeyF') {
            bullets.push({x: player.x + (lastDir === 1 ? 35 : 0), y: player.y + 15, xv: 16 * lastDir, alive: true});
        }
    };
    window.onkeyup = e => keys[e.code] = false;

    function reset() {
        player.x = 50; player.y = 400; player.xv = 0; player.yv = 0;
        player.onWall = false; player.isClimbing = false;
        currentLevelData = createLevel(level);
    }

    function showRiddle() {
        gameActive = false;
        const riddle = riddleBank[Math.floor(Math.random() * riddleBank.length)];
        const container = document.getElementById('riddle-container');
        const qElem = document.getElementById('riddle-question');
        const aElem = document.getElementById('riddle-answers');
        
        qElem.innerText = riddle.q;
        aElem.innerHTML = '';
        
        riddle.a.forEach((answer, index) => {
            const btn = document.createElement('button');
            btn.innerText = answer;
            btn.onclick = () => {
                if (index === riddle.c) {
                    score += 150;
                    currentLevelData.door.open = true;
                    // אפקט דלת נפתחת
                } else {
                    score = Math.max(0, score - 50);
                    // אפקט טעות
                }
                container.style.display = 'none';
                gameActive = true;
                loop();
            };
            aElem.appendChild(btn);
        });
        
        container.style.display = 'block';
    }

    function update() {
        if (!gameActive) return;
        const l = currentLevelData;

        // טיפוס
        if (player.onWall) {
            player.gravity = 0;
            player.xv = 0;
            if (keys.ArrowUp) { player.y -= 4; player.isClimbing = true; }
            else if (keys.ArrowDown) { player.y += 4; player.isClimbing = true; }
            else { player.yv = 0; player.isClimbing = false; }
            
            // בדיקה אם עדיין נוגע בקיר
            let stillOnWall = false;
            l.plats.forEach(p => {
                if (p.w < 50) { // זה קיר אנכי
                    if (player.y < p.y+p.h && player.y+player.h > p.y) {
                        if (player.wallDir === 1 && Math.abs(player.x + player.w - p.x) < 5) stillOnWall = true;
                        if (player.wallDir === -1 && Math.abs(player.x - (p.x + p.w)) < 5) stillOnWall = true;
                    }
                }
            });
            if (!stillOnWall) { player.onWall = false; player.gravity = 0.6; }
            if (keys.ArrowRight && player.wallDir === -1) { player.onWall = false; player.gravity = 0.6; }
            if (keys.ArrowLeft && player.wallDir === 1) { player.onWall = false; player.gravity = 0.6; }

        } else {
            // תנועה רגילה
            player.gravity = 0.6;
            if(keys.ArrowRight) { player.xv = player.speed; lastDir = 1; }
            else if(keys.ArrowLeft) { player.xv = -player.speed; lastDir = -1; }
            else player.xv *= 0.8;

            player.yv += player.gravity;
            player.x += player.xv; player.y += player.yv;
        }

        // התנגשות פלטפורמות וקירות
        player.onWall = false;
        l.plats.forEach(p => {
            if(player.x < p.x+p.w && player.x+player.w > p.x && player.y < p.y+p.h && player.y+player.h > p.y) {
                // התנגשות מלמעלה (רצפה)
                if(p.w > p.h && player.yv > 0 && player.y + player.h - player.yv <= p.y) {
                    player.y = p.y - player.h; player.yv = 0;
                }
                // התנגשות מהצד (קיר - להיצמד)
                else if (p.w < p.h) {
                    player.onWall = true;
                    player.yv = 0;
                    if (player.x < p.x) { // קיר מימין
                        player.x = p.x - player.w;
                        player.wallDir = 1;
                    } else { // קיר משמאל
                        player.x = p.x + p.w;
                        player.wallDir = -1;
                    }
                }
            }
        });

        // איסוף גזר חידה
        if (!l.carrot.collected && player.x < l.carrot.x + l.carrot.w && player.x + player.w > l.carrot.x && player.y < l.carrot.y + l.carrot.h && player.y + player.h > l.carrot.y) {
            l.carrot.collected = true;
            score += 50;
            showRiddle();
        }

        // יריות
        bullets.forEach((b, idx) => {
            b.x += b.xv;
            l.aliens.forEach(a => {
                if(a.alive && b.x > a.curX && b.x < a.curX+30 && b.y > a.y && b.y < a.y+30) {
                    a.alive = false; b.alive = false; score += 25;
                }
            });
            if(l.isBoss && b.x > l.boss.x && b.x < l.boss.x+l.boss.w && b.y > l.boss.y && b.y < l.boss.y+l.boss.h) {
                l.bossHp -= 5; b.alive = false;
                document.getElementById('bhp').innerText = Math.ceil((l.bossHp / l.maxBossHp) * 100);
                if(l.bossHp <= 0) { level++; score += 500; reset(); document.getElementById('lvl').innerText = level; }
            }
            if(b.x > canvas.width || b.x < 0) bullets.splice(idx, 1);
        });

        // חייזרים
        l.aliens.forEach(a => {
            if(!a.alive) return;
            a.curX += a.s * a.d;
            if(Math.abs(a.curX - a.x) > a.range) a.dir *= -1; // באג קטן בקוד המקורי, תוקן
            if(Math.abs(a.curX - a.x) > a.range) a.d *= -1;
            if(player.x < a.curX+30 && player.x+player.w > a.curX && player.y < a.y+30 && player.y+player.h > a.y) reset();
        });

        // ניצחון שלב או בוס
        if(!l.isBoss && l.door.open) {
            if(player.x > l.door.x - 10) { level++; score += 100; reset(); document.getElementById('lvl').innerText = level; }
        } else if (l.isBoss) {
            l.boss.x += l.boss.s * l.boss.d; 
            if(l.boss.x > 850 || l.boss.x < 50) l.boss.d *= -1;
            if(player.x < l.boss.x+l.boss.w && player.x+player.w > l.boss.x && player.y < l.boss.y+l.boss.h && player.y+player.h > l.boss.y) reset();
        }

        if(player.y > 600) reset();
        if(player.x < 0) player.x = 0;
        if(player.x > 1065) player.x = 1065;
    }

    function draw() {
        const l = currentLevelData;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // פלטפורמות וקירות
        l.plats.forEach(p => {
            if (p.w < p.h) ctx.fillStyle = "#64748b"; // צבע שונה לקירות טיפוס
            else ctx.fillStyle = "#334155";
            ctx.fillRect(p.x, p.y, p.w, p.h);
        });

        // גזר חידה
        if (!l.carrot.collected) {
            ctx.fillStyle = "#f97316"; ctx.shadowBlur = 15; ctx.shadowColor = "#f97316";
            ctx.fillRect(l.carrot.x, l.carrot.y, l.carrot.w, l.carrot.h);
            ctx.fillStyle = "#16a34a"; ctx.fillRect(l.carrot.x+10, l.carrot.y-10, 10, 10); // עלים
            ctx.shadowBlur = 0;
        }

        // דלת יציאה
        ctx.fillStyle = l.door.open ? "#10b981" : "#444"; 
        ctx.shadowBlur = l.door.open ? 15 : 0; ctx.shadowColor = "#10b981";
        ctx.fillRect(l.door.x, l.door.y, l.door.w, l.door.h);
        ctx.shadowBlur = 0;
        if(!l.isBoss) {
            ctx.fillStyle = "white"; ctx.font = "bold 16px sans-serif"; 
            ctx.fillText(l.door.open ? "פתוח" : "נעול", l.door.x+5, l.door.y-10);
        }
        
        // חייזרים
        ctx.fillStyle = "#a855f7"; 
        l.aliens.forEach(a => { if(a.alive) ctx.fillRect(a.curX, a.y, 30, 30); });

        // לייזרים זוהרים
        bullets.forEach(b => {
            if(b.alive) {
                ctx.fillStyle = "#60a5fa"; ctx.shadowBlur = 10; ctx.shadowColor = "#60a5fa";
                ctx.fillRect(b.x, b.y, 20, 5);
                ctx.shadowBlur = 0;
            }
        });

        // בוס ענק
        if(l.isBoss) {
            ctx.fillStyle = "#ef4444"; ctx.shadowBlur = 30; ctx.shadowColor = "red";
            ctx.fillRect(l.boss.x, l.boss.y, l.boss.w, l.boss.h);
            ctx.shadowBlur = 0;
            ctx.fillStyle = "black"; ctx.fillRect(l.boss.x+40, l.boss.y+50, 40, 40); ctx.fillRect(l.boss.x+140, l.boss.y+50, 40, 40);
        }

        // שחקן (ארנב)
        ctx.fillStyle = "#f8fafc"; // לבן-אפרפר
        ctx.fillRect(player.x, player.y, player.w, player.h);
        // אוזניים
        ctx.fillRect(player.x + 5, player.y - 20, 10, 25);
        ctx.fillRect(player.x + 20, player.y - 20, 10, 25);
        // עיניים
        ctx.fillStyle = "black";
        let eyeX = lastDir === 1 ? player.x + 22 : player.x + 5;
        ctx.fillRect(eyeX, player.y + 10, 5, 10);
        
        // אקדח
        ctx.fillStyle = "#aaa";
        ctx.fillRect(player.x + (lastDir === 1 ? 35 : -10), player.y + 20, 10, 5);
        
        document.getElementById('sc').innerText = score;
        document.getElementById('lvl').innerText = level;
    }

    function loop() { if(gameActive) { update(); draw(); requestAnimationFrame(loop); } }
    loop();
</script>
</body>
</html>
