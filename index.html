<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>אוזן המן החכמה - חידון פורים</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle, #4c1d95, #1e1b4b);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* עיצוב אוזן המן ב-CSS */
        .hamantash {
            width: 0;
            height: 0;
            border-left: 100px solid transparent;
            border-right: 100px solid transparent;
            border-bottom: 170px solid #d97706; /* צבע בצק */
            position: relative;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        .hamantash:hover { transform: scale(1.1) rotate(5deg); }

        /* המילוי */
        .filling {
            position: absolute;
            top: 70px;
            left: -30px;
            width: 60px;
            height: 60px;
            background: #451a03; /* שוקולד/פרג */
            border-radius: 50%;
        }

        /* העיניים של הדמות */
        .eye {
            position: absolute;
            width: 15px;
            height: 15px;
            background: white;
            border-radius: 50%;
            top: 100px;
        }
        .eye.left { left: -40px; }
        .eye.right { left: 25px; }
        .eye::after {
            content: '';
            position: absolute;
            width: 7px;
            height: 7px;
            background: black;
            border-radius: 50%;
            top: 4px;
            left: 4px;
        }

        #ui-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            margin-top: 40px;
            border: 2px solid #f59e0b;
        }

        input {
            padding: 12px;
            font-size: 18px;
            border-radius: 10px;
            border: none;
            width: 80%;
            margin: 15px 0;
            text-align: center;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            background: #f59e0b;
            color: #451a03;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover { background: #fbce77; }

        #costume-result {
            margin-top: 20px;
            font-weight: bold;
            color: #34d399;
            font-size: 22px;
            min-height: 50px;
        }

        .confetti { position: absolute; width: 10px; height: 10px; z-index: -1; }
    </style>
</head>
<body>

    <div class="hamantash" id="hero">
        <div class="filling"></div>
        <div class="eye left"></div>
        <div class="eye right"></div>
    </div>

    <div id="ui-box">
        <h2 id="question-text">טוען שאלה...</h2>
        <input type="text" id="answer-input" placeholder="הקלד תשובה כאן..." autocomplete="off">
        <br>
        <button onclick="checkAnswer()">בדוק תשובה!</button>
        <div id="costume-result"></div>
    </div>

<script>
    const questions = [
        { q: "מי הייתה המלכה לפני אסתר?", a: "ושתי" },
        { q: "באיזו עיר התרחשה עלילת המגילה?", a: "שושן" },
        { q: "איך קוראים למתנות שנותנים לחברים בפורים?", a: "משלוח מנות" },
        { q: "מי היה הדוד (או בן דוד) של אסתר?", a: "מרדכי" },
        { q: "מה היה שמו של המלך בסיפור הפסטורלי הזה?", a: "אחשורוש" },
        { q: "כמה בנים היו להמן הרשע?", a: "10" },
        { q: "באיזה חודש חוגגים את פורים?", a: "אדר" }
    ];

    const costumes = [
        "**אסטרונאוט עם חישוק:** (שבתאי)",
        "**אנשי קשר:** (להדביק אנשי צעצוע על הבגד)",
        "**ענן גשם:** (מטרייה עם צמר גפן כחול)",
        "**פופקורן אנושי:** (להדביק פופקורן על חולצה לבנה)",
        "**תחפושת 'טעות 404':** (חולצה לבנה שכתוב עליה 'התחפושת לא נמצאה')",
        "**קקטוס:** (סוודר ירוק עם אזיקונים לבנים בולטים)",
        "**סושי אנושי:** (כרית לבנה על הגב עם בד כתום)"
    ];

    let currentQ = 0;

    function loadQuestion() {
        if (currentQ >= questions.length) {
            document.getElementById('question-text').innerText = "סיימת את כל השאלות! חג שמח!";
            document.getElementById('answer-input').style.display = 'none';
            return;
        }
        document.getElementById('question-text').innerText = questions[currentQ].q;
        document.getElementById('answer-input').value = "";
        document.getElementById('costume-result').innerText = "";
    }

    function checkAnswer() {
        const userAns = document.getElementById('answer-input').value.trim();
        const correctAns = questions[currentQ].a;

        if (userAns === correctAns) {
            const randomCostume = costumes[Math.floor(Math.random() * costumes.length)];
            document.getElementById('costume-result').innerHTML = "נכון! רעיון לתחפושת: <br>" + randomCostume;
            createConfetti();
            currentQ++;
            setTimeout(loadQuestion, 4000); // עובר שאלה אחרי 4 שניות
        } else {
            document.getElementById('costume-result').innerText = "אופס, לא בדיוק. נסה שוב!";
            document.getElementById('costume-result').style.color = "#f87171";
            setTimeout(() => document.getElementById('costume-result').style.color = "#34d399", 1000);
        }
    }

    function createConfetti() {
        for (let i = 0; i < 50; i++) {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.left = Math.random() * 100 + "vw";
            c.style.top = "-10px";
            c.style.backgroundColor = `hsl(${Math.random() * 360}, 70%, 60%)`;
            document.body.appendChild(c);

            const animation = c.animate([
                { transform: 'translateY(0) rotate(0)', opacity: 1 },
                { transform: `translateY(100vh) rotate(${Math.random() * 360}deg)`, opacity: 0 }
            ], { duration: 2000 + Math.random() * 3000 });

            animation.onfinish = () => c.remove();
        }
    }

    // הפעלת שאלה ראשונה
    loadQuestion();

    // תמיכה במקש Enter
    document.getElementById('answer-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') checkAnswer();
    });
</script>
</body>
</html>
