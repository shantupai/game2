<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>הנוטאים - שיגור בטוח במיוחד!</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; margin: 0 auto; background: #0b0f19; border: 2px solid #334; }
        #ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; 
              color: white; font-size: 18px; font-weight: bold; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <div style="color: #38bdf8;">שחקן 1 (חצים): <span id="hp1">3</span> ❤️</div>
        <div style="color: #f87171;">שחקן 2 (WASD): <span id="hp2">3</span> ❤️</div>
        <div style="color: #4ade80;">שחקן 3 (VBNM): <span id="hp3">3</span> ❤️</div>
        <div>🚀 שלב: <span id="lvl">1</span> | ✨ ניקוד: <span id="sc">0</span></div>
    </div>
    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
    canvas.width = 1100; canvas.height = 550;

    let totalScore = 0, level = 1, frames = 0;
    let superTimer = 0, ghostTimer = 0, shield = false, doorActive = false;
    
    let players = [
        { x: 100, y: 450, w: 25, h: 25, xv: 0, yv: 0, hp: 3, invul: 0, active: true, color: "#38bdf8" },
        { x: 150, y: 450, w: 25, h: 25, xv: 0, yv: 0, hp: 3, invul: 0, active: true, color: "#f87171" },
        { x: 200, y: 450, w: 25, h: 25, xv: 0, yv: 0, hp: 3, invul: 0, active: true, color: "#4ade80" }
    ];

    let platforms = [], spikes = [], aliens = [], items = [];

    function setupLevel() {
        doorActive = false;
        players.forEach((p, i) => { p.x = 100 + i*50; p.y = 450; p.xv = 0; p.yv = 0; p.invul = 60; });
        
        platforms = [
            { x: 0, y: 520, w: 1100, h: 30 },
            { x: 200, y: 380, w: 200, h: 15 },
            { x: 700, y: 380, w: 200, h: 15 },
            { x: 450, y: 240, w: 200, h: 15 }
        ];
        
        spikes = [{ x: 420, y: 500, w: 40, h: 20 }, { x: 640, y: 500, w: 40, h: 20 }];
        
        aliens = [];
        for(let i=0; i < 4 + level; i++) {
            aliens.push({ x: 300+Math.random()*600, y: 100+Math.random()*300, dir: 1, speed: 1.3 + level*0.15, alive: true });
        }

        spawnItems();
        document.getElementById('lvl').innerText = level;
    }

    function spawnItems() {
        items = [];
        for(let i=0; i<8; i++) items.push({ x: 100+Math.random()*900, y: 100+Math.random()*350, type: 'yellow', active: true });
        ['blue', 'pink', 'purple', 'green'].forEach(t => items.push({ x: 100+Math.random()*900, y: 100+Math.random()*350, type: t, active: true }));
    }

    // פונקציית שיגור למקום בטוח
    function safeTeleport(p) {
        let safe = false;
        let attempts = 0;
        while (!safe && attempts < 50) {
            let targetX = 50 + Math.random() * 1000;
            let targetY = 450; // תמיד על הרצפה
            
            // בדיקה שאין קוצים קרובים
            let nearSpike = spikes.some(s => Math.abs(targetX - s.x) < 60);
            // בדיקה שאין חייזרים קרובים
            let nearAlien = aliens.some(a => a.alive && Math.abs(targetX - a.x) < 80 && Math.abs(targetY - a.y) < 80);
            
            if (!nearSpike && !nearAlien) {
                p.x = targetX;
                p.y = targetY;
                p.invul = 60; // חסינות לשנייה
                safe = true;
            }
            attempts++;
        }
    }

    let keys = {};
    window.onkeydown = e => {
        keys[e.code] = true;
        if(e.code === 'ArrowDown' && players[0].active) safeTeleport(players[0]);
        if(e.code === 'KeyS' && players[1].active) safeTeleport(players[1]);
        if(e.code === 'KeyM' && players[2].active) safeTeleport(players[2]);
    };
    window.onkeyup = e => keys[e.code] = false;

    function updatePlayer(p, l, r, u) {
        if (!p.active) return;
        let s = (superTimer > 0) ? 9 : 5.5;
        if(keys[r]) p.xv = s; else if(keys[l]) p.xv = -s; else p.xv *= 0.8;
        
        p.yv += 0.6; p.x += p.xv; p.y += p.yv;

        platforms.forEach(plat => {
            if(p.x < plat.x+plat.w && p.x+p.w > plat.x && p.y+p.h > plat.y && p.y+p.h < plat.y+plat.h+10) {
                p.y = plat.y - p.h; p.yv = 0;
            }
        });

        if(keys[u] && p.yv === 0) p.yv = (superTimer > 0) ? -14 : -11;

        // בדיקת פגיעה - רק אם לא בחסינות
        if (p.invul <= 0 && ghostTimer <= 0) {
            spikes.forEach(s => { if(p.x < s.x+s.w && p.x+p.w > s.x && p.y+p.h > s.y) hurt(p); });
            aliens.forEach(a => { if(a.alive && Math.abs(p.x-a.x)<25 && Math.abs(p.y-a.y)<25) hurt(p); });
        }
        if(p.invul > 0) p.invul--;

        // איסוף פריטים
        items.forEach(it => {
            if(it.active && Math.abs(p.x-it.x)<30 && Math.abs(p.y-it.y)<30) {
                it.active = false;
                if(it.type === 'yellow') totalScore += 10;
                else {
                    if(it.type !== 'green') { aliens.forEach(a => a.alive = false); }
                    if(it.type === 'blue') superTimer = 400;
                    if(it.type === 'pink') ghostTimer = 400;
                    if(it.type === 'purple') shield = true;
                    if(it.type === 'green') players.forEach(pl => { pl.hp = 3; pl.active = true; });
                }
            }
        });

        if(doorActive && p.x > 1000 && p.y > 400) { level++; setupLevel(); }
        if(p.y > 600) { p.x = 100; p.y = 450; hurt(p); }
    }

    function hurt(p) {
        if(shield) { shield = false; p.invul = 60; return; }
        p.hp--; p.invul = 100; if(p.hp <= 0) p.active = false;
    }

    function draw() {
        ctx.fillStyle = "#0b0f19"; ctx.fillRect(0,0,1100,550);
        frames++;
        if(superTimer > 0) superTimer--; if(ghostTimer > 0) ghostTimer--;

        updatePlayer(players[0], 'ArrowLeft', 'ArrowRight', 'ArrowUp');
        updatePlayer(players[1], 'KeyA', 'KeyD', 'KeyW');
        updatePlayer(players[2], 'KeyV', 'KeyN', 'KeyB');

        ctx.fillStyle = "#1e293b"; platforms.forEach(plat => ctx.fillRect(plat.x, plat.y, plat.w, plat.h));
        ctx.fillStyle = "#ef4444"; spikes.forEach(s => ctx.fillRect(s.x, s.y, s.w, s.h));
        
        aliens.forEach(a => {
            if(!a.alive) return;
            a.x += a.dir * a.speed; if(a.x > 1050 || a.x < 50) a.dir *= -1;
            ctx.fillStyle = "#a855f7"; ctx.beginPath(); ctx.arc(a.x, a.y, 12, 0, 7); ctx.fill();
        });

        if(items.every(i => !i.active)) doorActive = true;
        items.forEach(it => {
            if(!it.active) return;
            let colors = { blue: "#38bdf8", pink: "#f472b6", purple: "#a855f7", green: "#4ade80", yellow: "#fbbf24" };
            ctx.fillStyle = colors[it.type]; ctx.beginPath(); ctx.arc(it.x, it.y, 8, 0, 7); ctx.fill();
        });

        if(doorActive) { ctx.fillStyle = "#8b5cf6"; ctx.fillRect(1020, 440, 50, 80); }

        players.forEach(p => {
            if(!p.active) return;
            // הבהוב כשנמצאים בחסינות/שיגור
            ctx.globalAlpha = ghostTimer > 0 ? 0.4 : (p.invul > 0 && frames % 6 < 3 ? 0.3 : 1);
            ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.w, p.h);
            if(shield) { ctx.strokeStyle = "white"; ctx.strokeRect(p.x-3, p.y-3, p.w+6, p.h+6); }
            ctx.globalAlpha = 1;
        });

        document.getElementById('sc').innerText = totalScore;
        document.getElementById('hp1').innerText = players[0].hp;
        document.getElementById('hp2').innerText = players[1].hp;
        document.getElementById('hp3').innerText = players[2].hp;

        requestAnimationFrame(draw);
    }

    setupLevel(); draw();
</script>
</body>
</html>
