<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>הנוטאים - אתגר קפיצת הקיר</title>
    <style>
        body { margin: 0; background: #020617; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; margin: 0 auto; background: #020617; }
        #stats { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; color: white; font-size: 20px; font-weight: bold; pointer-events: none; text-shadow: 2px 2px 4px #000; }
        #super-bar { position: absolute; top: 45px; left: 50%; transform: translateX(-50%); width: 200px; height: 10px; background: #1e293b; border-radius: 5px; display: none; overflow: hidden; border: 2px solid #38bdf8; }
        #super-progress { height: 100%; background: #38bdf8; width: 100%; }
        .hint { position: absolute; bottom: 10px; width: 100%; text-align: center; color: #94a3b8; font-size: 16px; }
    </style>
</head>
<body>
    <div id="stats">
        <div>🚀 שלב: <span id="lvl">1</span></div>
        <div>❤️ חיים: <span id="hp">3</span></div>
        <div>✨ כוכבים: <span id="sc">0</span></div>
    </div>
    <div id="super-bar"><div id="super-progress"></div></div>
    <div class="hint">חצים לזוז | **היצמד לקיר וקפוץ (רווח) כדי לזנק ממנו!** | 🔵 כוכב כחול = חסינות</div>
    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
    canvas.width = 1100; canvas.height = 550;

    let level = 1, score = 0, health = 3, frames = 0;
    let player = { x: 50, y: 400, w: 25, h: 25, xv: 0, yv: 0, jumps: 0, invul: 0, superTimer: 0, maxSuper: 400 };
    let platforms = [], walls = [], aliens = [], stars = [], blueStar = null, particles = [], spikes = [], lasers = [], door = {};
    let keys = {};

    function setupLevel() {
        platforms = []; walls = []; aliens = []; stars = []; particles = []; spikes = []; lasers = [];
        player.x = 50; player.y = 450; player.xv = 0; player.yv = 0; player.superTimer = 0;
        
        platforms.push({ x: 0, y: 520, w: 1100, h: 30 }); // רצפה

        // יצירת קירות גבוהים יותר למעבר
        for(let i=0; i<3; i++) {
            walls.push({ x: 300 + i*300, y: 100, w: 30, h: 350 });
        }

        // מדרגות
        for(let i=0; i<12; i++) {
            let px = Math.random() * 950;
            let py = 150 + Math.random() * 300;
            platforms.push({ x: px, y: py, w: 100, h: 12 });
            if(Math.random() > 0.7) spikes.push({ x: px + 20, y: py - 10, w: 60 });
        }

        for(let i=0; i<5; i++) stars.push({ x: 100 + Math.random()*900, y: 50 + Math.random()*400, collected: false });
        blueStar = { x: 500 + Math.random()*400, y: 100 + Math.random()*200, collected: false };
        door = { x: 1020, y: 60, w: 40, h: 60 };
        platforms.push({ x: 1000, y: 120, w: 80, h: 12 });

        document.getElementById('lvl').innerText = level;
    }

    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    function update() {
        frames++;
        if(player.invul > 0) player.invul--;
        
        // עדכון מד סופר
        const bar = document.getElementById('super-bar');
        if(player.superTimer > 0) {
            player.superTimer--;
            bar.style.display = 'block';
            document.getElementById('super-progress').style.width = (player.superTimer / player.maxSuper * 100) + '%';
        } else {
            bar.style.display = 'none';
        }

        // תנועה אופקית
        if(keys.ArrowRight) player.xv = 6;
        else if(keys.ArrowLeft) player.xv = -6;
        else player.xv *= 0.8;

        // בדיקת היצמדות לקיר
        let touchingWall = null;
        walls.forEach(w => {
            if(player.x + player.w + 5 > w.x && player.x - 5 < w.x + w.w && player.y < w.y + w.h && player.y + player.h > w.y) {
                touchingWall = (player.x < w.x) ? "left" : "right";
            }
        });

        // פיזיקת קיר: החלקה איטית אם נוגעים בקיר תוך כדי נפילה
        if(touchingWall && player.yv > 0) {
            player.yv = 2; // החלקה איטית
            player.jumps = 0; // מאפשר לקפוץ שוב מהקיר
        } else {
            player.yv += 0.55; // גרביטציה רגילה
        }

        // קפיצה
        if((keys.Space || keys.ArrowUp) && !player.jumpLock) {
            if(touchingWall) {
                player.yv = -12;
                player.xv = (touchingWall === "left") ? -12 : 12; // זינוק חזק מהקיר
                player.jumpLock = true;
            } else if(player.jumps < 2) {
                player.yv = -11;
                player.jumps++;
                player.jumpLock = true;
            }
        }
        if(!keys.Space && !keys.ArrowUp) player.jumpLock = false;

        player.x += player.xv;
        player.y += player.yv;

        // התנגשויות קירות (מניעת מעבר דרכם)
        walls.forEach(w => {
            if(player.x < w.x+w.w && player.x+player.w > w.x && player.y < w.y+w.h && player.y+player.h > w.y) {
                if(player.xv > 0 && player.x < w.x) { player.x = w.x - player.w; player.xv = 0; }
                else if(player.xv < 0 && player.x > w.x) { player.x = w.x + w.w; player.xv = 0; }
            }
        });

        // התנגשות פלטפורמות
        platforms.forEach(p => {
            if(player.x < p.x+p.w && player.x+player.w > p.x && player.y+player.h > p.y && player.y+player.h < p.y+p.h+12 && player.yv >= 0) {
                player.y = p.y - player.h; player.yv = 0; player.jumps = 0;
            }
        });

        // כוכב כחול
        if(!blueStar.collected && Math.abs(player.x - blueStar.x) < 30 && Math.abs(player.y - blueStar.y) < 30) {
            blueStar.collected = true; player.superTimer = player.maxSuper; score += 100;
        }

        // נזק (קוצים)
        if(player.superTimer <= 0) {
            spikes.forEach(s => {
                if(player.x < s.x+s.w && player.x+player.w > s.x && player.y+player.h > s.y && player.y < s.y+10) {
                    health--; player.invul = 60; player.yv = -10;
                    if(health <= 0) { alert("Game Over!"); level=1; health=3; setupLevel(); }
                }
            });
        }

        if(Math.abs(player.x - door.x) < 40 && Math.abs(player.y - door.y) < 50) { level++; setupLevel(); }
        if(player.y > 600) { health--; setupLevel(); }
        
        document.getElementById('sc').innerText = score;
        document.getElementById('hp').innerText = health;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // קירות ופלטפורמות
        ctx.fillStyle = "#475569";
        walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));
        platforms.forEach(p => { 
            ctx.fillStyle = "#1e293b"; ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle = "#10b981"; ctx.fillRect(p.x, p.y, p.w, 3);
        });

        // קוצים
        ctx.fillStyle = "#ef4444";
        spikes.forEach(s => { for(let i=0;
