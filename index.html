<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>הנוטאים - לייזרים וקוצים</title>
    <style>
        body { margin: 0; background: #020617; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; margin: 0 auto; background: #020617; }
        #stats { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; color: white; font-size: 20px; font-weight: bold; pointer-events: none; text-shadow: 2px 2px 4px #000; }
        .hint { position: absolute; bottom: 10px; width: 100%; text-align: center; color: #94a3b8; font-size: 16px; }
    </style>
</head>
<body>
    <div id="stats">
        <div>🚀 שלב: <span id="lvl">1</span></div>
        <div>❤️ חיים: <span id="hp">3</span></div>
        <div>✨ כוכבים: <span id="sc">0</span></div>
    </div>
    <div class="hint">חצים לזוז | רווח לקפיצה | **זהירות מהקוצים ומהלייזרים!**</div>
    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = 1100; canvas.height = 550;

    let level = 1, score = 0, health = 3, frames = 0;
    let player = { x: 50, y: 400, w: 25, h: 25, xv: 0, yv: 0, jumps: 0, invul: 0 };
    let platforms = [], aliens = [], stars = [], particles = [], spikes = [], lasers = [], door = {};
    let keys = {};

    function setupLevel() {
        platforms = []; aliens = []; stars = []; particles = []; spikes = []; lasers = [];
        player.x = 50; player.y = 450; player.xv = 0; player.yv = 0;
        
        // רצפה בסיסית
        platforms.push({ x: 0, y: 520, w: 1100, h: 30 });

        // יצירת פלטפורמות
        for(let i=0; i<20; i++) {
            let px = 100 + Math.random() * 900;
            let py = 100 + Math.random() * 350;
            let pw = 70 + Math.random() * 60;
            platforms.push({ x: px, y: py, w: pw, h: 12 });

            // הוספת קוצים רנדומליים על חלק מהפלטפורמות
            if(Math.random() > 0.7) {
                spikes.push({ x: px + 10, y: py - 10, w: pw - 20 });
            }

            // הוספת לייזרים על חלק מהפלטפורמות
            if(Math.random() > 0.8) {
                lasers.push({ x: px + pw/2, y: py - 15, timer: Math.random() * 100 });
            }
        }

        // חייזרים
        let alienCount = 5 + level; 
        for(let i=0; i < alienCount; i++) {
            aliens.push({
                x: 200 + Math.random() * 850,
                y: 50 + Math.random() * 400,
                baseY: 0, floatSpeed: 0.03,
                floatDist: 30, alive: true
            });
            aliens[i].baseY = aliens[i].y;
        }

        // כוכבים
        for(let i=0; i<5; i++) {
            stars.push({ x: 150 + Math.random()*850, y: 50 + Math.random()*400, collected: false });
        }

        let highPlat = platforms[Math.floor(Math.random() * platforms.length)];
        door = { x: highPlat.x, y: highPlat.y - 60, w: 40, h: 60 };

        document.getElementById('lvl').innerText = level;
        document.getElementById('hp').innerText = health;
    }

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    function takeDamage() {
        if(player.invul > 0) return;
        health--;
        player.invul = 60;
        player.yv = -8; // קפיצה קטנה כשנפגעים
        createExplosion(player.x+12, player.y+12, "#ef4444");
        if(health <= 0) {
            alert("המשחק נגמר!");
            level = 1; health = 3; score = 0; setupLevel();
        }
    }

    function createExplosion(x, y, color) {
        for(let i=0; i<10; i++) {
            particles.push({
                x: x, y: y, 
                xv: (Math.random()-0.5)*10, 
                yv: (Math.random()-0.5)*10, 
                life: 20, color: color
            });
        }
    }

    function update() {
        frames++;
        if(player.invul > 0) player.invul--;

        player.xv = 0;
        if(keys.ArrowRight) player.xv = 6;
        if(keys.ArrowLeft) player.xv = -6;

        if((keys.Space || keys.ArrowUp) && player.jumps < 2 && !player.jumpLock) {
            player.yv = -11; player.jumps++; player.jumpLock = true;
        }
        if(!keys.Space && !keys.ArrowUp) player.jumpLock = false;

        player.yv += 0.55;
        player.x += player.xv; player.y += player.yv;

        // התנגשות פלטפורמות
        platforms.forEach(p => {
            if(player.x < p.x+p.w && player.x+player.w > p.x && 
               player.y+player.h > p.y && player.y+player.h < p.y+p.h+10 && player.yv >= 0) {
                player.y = p.y - player.h; player.yv = 0; player.jumps = 0;
            }
        });

        // בדיקת קוצים
        spikes.forEach(s => {
            if(player.x < s.x + s.w && player.x + player.w > s.x && 
               player.y + player.h > s.y && player.y < s.y + 10) {
                takeDamage();
            }
        });

        // עדכון לייזרים
        lasers.forEach(l => {
            l.timer++;
            let isFiring = (l.timer % 120 > 60); // יורה למשך 60 פריימים כל 120 פריימים
            if(isFiring) {
                // בדיקת פגיעה מהקרן (קרן ורטיקלית למעלה)
                if(player.x < l.x + 5 && player.x + player.w > l.x - 5 && player.y < l.y) {
                    takeDamage();
                }
            }
        });

        // איסוף כוכבים
        stars.forEach(s => {
            if(!s.collected && Math.abs(player.x - s.x) < 30 && Math.abs(player.y - s.y) < 30) {
                s.collected = true; score += 50;
                for(let a of aliens) { if(a.alive) { a.alive = false; createExplosion(a.x+15, a.y+15, "#f59e0b"); break; } }
            }
        });

        // חייזרים
        aliens.forEach(a => {
            if(!a.alive) return;
            a.y = a.baseY + Math.sin(frames * a.floatSpeed) * a.floatDist;
            if(player.invul <= 0 && Math.abs(player.x - a.x) < 25 && Math.abs(player.y - a.y) < 25) takeDamage();
        });

        // יציאה
        if(Math.abs(player.x - door.x) < 40 && Math.abs(player.y - door.y) < 50) {
            level++; setupLevel();
        }

        if(player.y > 600) { health--; setupLevel(); }

        particles.forEach((p, i) => {
            p.x += p.xv; p.y += p.yv; p.life--;
            if(p.life <= 0) particles.splice(i, 1);
        });
        
        document.getElementById('sc').innerText = score;
        document.getElementById('hp').innerText = health;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // פלטפורמות
        ctx.fillStyle = "#334155";
        platforms.forEach(p => {
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle = "#4ade80"; ctx.fillRect(p.x, p.y, p.w, 3); ctx.fillStyle = "#334155";
        });

        // קוצים
        ctx.fillStyle = "#ef4444";
        spikes.forEach(s => {
            for(let i=0; i < s.w; i+=10) {
                ctx.beginPath();
                ctx.moveTo(s.x + i, s.y + 10);
                ctx.lineTo(s.x + i + 5, s.y);
                ctx.lineTo(s.x + i + 10, s.y + 10);
                ctx.fill();
            }
        });

        // לייזרים
        lasers.forEach(l => {
            ctx.fillStyle = "#94a3b8";
            ctx.fillRect(l.x - 10, l.y, 20, 10); // בסיס הלייזר
            ctx.fillStyle = "#f43f5e";
            ctx.fillRect(l.x - 4, l.y - 5, 8, 5); // קנה

            if(l.timer % 120 > 60) { // אפקט הירי
                ctx.strokeStyle = "#f43f5e";
                ctx.lineWidth = 3;
                ctx.shadowBlur = 10; ctx.shadowColor = "red";
                ctx.beginPath();
                ctx.moveTo(l.x, l.y - 5);
                ctx.lineTo(l.x, 0);
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
        });

        // כוכבים, דלת, שחקן, חייזרים וחלקיקים (אותו קוד)
        stars.forEach(s => { if(!s.collected) { ctx.fillStyle = "#fbbf24"; ctx.beginPath(); ctx.arc(s.x, s.y, 10, 0, Math.PI*2); ctx.fill(); }});
        ctx.fillStyle = "#8b5cf6"; ctx.fillRect(door.x, door.y, door.w, door.h);
        ctx.fillStyle = (player.invul > 0 && frames % 10 < 5) ? "transparent" : "#38bdf8";
        ctx.fillRect(player.x, player.y, player.w, player.h);
        aliens.forEach(a => { if(!a.alive) return; ctx.fillStyle = "#f43f5e"; ctx.beginPath(); ctx.ellipse(a.x+15, a.y+15, 15, 10, 0, 0, Math.PI*2); ctx.fill(); });
        particles.forEach(p => { ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 3, 3); });
    }

    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
    setupLevel();
    gameLoop();
</script>
</body>
</html>
