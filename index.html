<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>ארנב החידות והחבר המעודד</title>
    <style>
        body { margin: 0; background: #0f172a; color: white; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; text-align: center; }
        canvas { background: #1e293b; display: block; margin: 20px auto; border: 5px solid #334155; border-radius: 10px; box-shadow: 0 0 40px rgba(0,0,0,0.6); }
        #ui { font-size: 26px; font-weight: bold; margin-top: 15px; display: flex; justify-content: center; gap: 30px; }
        #riddle-box {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; color: #1e293b; padding: 30px; border-radius: 20px;
            box-shadow: 0 0 100px rgba(0,0,0,0.8); z-index: 100; width: 350px; border: 5px solid #10b981;
        }
        button { width: 100%; padding: 12px; margin: 8px 0; cursor: pointer; font-weight: bold; background: #10b981; color: white; border: none; border-radius: 8px; font-size: 16px; transition: 0.2s; }
        button:hover { background: #059669; transform: scale(1.02); }
        .info { color: #94a3b8; margin-top: 5px; }
    </style>
</head>
<body>

<div id="ui">
    <div style="color: #60a5fa;">🏁 שלב: <span id="lvl">1</span>/5</div>
    <div style="color: #fbbf24;">🥕 גזרים: <span id="gz">0</span>/3</div>
    <div style="color: #34d399;">✨ ניקוד: <span id="sc">0</span></div>
</div>
<div class="info">חצים: תנועה וטיפוס | רווח: קפיצה וקפיצת קיר | פתור 3 חידות כדי לפתוח את הפח!</div>

<div id="riddle-box">
    <h2 id="q" style="margin-top:0">חידה!</h2>
    <div id="ans"></div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 900; canvas.height = 550;

    let level = 1, score = 0, carrotsCollected = 0, isPaused = false;
    let player = { x: 50, y: 400, w: 30, h: 40, vx: 0, vy: 0, onWall: false, wallDir: 0, faceDir: 1 };
    let npc = { x: 120, y: 460, msg: "" };
    let platforms = [], carrots = [];
    const keys = {};

    // בנק חידות לכל שלב (3 חידות לכל שלב)
    const riddlesByLevel = {
        1: [
            {q: "מה יש לו שיניים אבל לא נושך?", a: ["מסרק", "מפתח", "מסור"], c: 0},
            {q: "מה שייך לך אבל אחרים משתמשים בו יותר?", a: ["השם שלך", "הטלפון", "הכסף"], c: 0},
            {q: "מה תמיד בא אבל אף פעם לא מגיע?", a: ["האוטובוס", "מחר", "החופש"], c: 1}
        ],
        2: [
            {q: "מה נרטב כשמייבשים אותו?", a: ["ספוג", "מגבת", "ים"], c: 1},
            {q: "למי יש רגליים אבל הוא לא יכול ללכת?", a: ["שולחן", "נחש", "כיסא"], c: 0},
            {q: "מה עולה ולא יורד לעולם?", a: ["בלון", "הגיל שלך", "מטוס"], c: 1}
        ],
        3: [
            {q: "מה מלא חורים אבל עדיין מחזיק מים?", a: ["מסננת", "ספוג", "דלי"], c: 1},
            {q: "מה נשבר כשמדברים עליו?", a: ["זכוכית", "הבטחה", "שתיקה"], c: 2},
            {q: "מה תמיד לפניך אבל אתה לא רואה?", a: ["העתיד", "הגב", "האף"], c: 0}
        ],
        4: [
            {q: "מה מתחיל ב-ת', נגמר ב-ת' ויש בו ת'?", a: ["תות", "תיבת דואר", "תחנה"], c: 1},
            {q: "מה רץ אבל אין לו רגליים?", a: ["זמן", "נהר", "שניהם"], c: 2},
            {q: "מה יש לו ראש וזנב אבל אין לו גוף?", a: ["נחש", "מטבע", "לטאה"], c: 1}
        ],
        5: [
            {q: "מה נהיה גבוה יותר ככל שמוציאים ממנו יותר?", a: ["בור", "בניין", "עץ"], c: 0},
            {q: "מה יש לו יד אבל לא יכול למחוא כפיים?", a: ["שעון", "בובה", "כפפה"], c: 0},
            {q: "מי אני? אם תאכל אותי אני אחיה, אם תשקה אותי אני אמות.", a: ["צמח", "אש", "רעב"], c: 1}
        ]
    };

    const npcMessages = ["אתה אלוף!", "איזה טיפוס מרשים!", "קדימה לגזרים!", "הפח מחכה לך!", "כמעט שם!"];

    function initLevel(num) {
        carrotsCollected = 0;
        player.x = 50; player.y = 450; player.vx = 0; player.vy = 0;
        npc.msg = npcMessages[num-1];
        
        // בניית שלב משתנה
        platforms = [
            {x: 0, y: 520, w: 900, h: 30, wall: false}, // רצפה
            {x: 350 + (num*20), y: 120, w: 40, h: 400, wall: true}, // קיר טיפוס משתנה
            {x: 700 - (num*10), y: 50, w: 40, h: 350, wall: true}   // קיר טיפוס 2
        ];

        // מדרגות
        platforms.push({x: 120, y: 380, w: 120, h: 15, wall: false});
        platforms.push({x: 500, y: 220, w: 120, h: 15, wall: false});

        // גזרים במיקומים שונים
        carrots = [
            {x: 150, y: 340, active: true},
            {x: 380 + (num*20), y: 180, active: true},
            {x: 730 - (num*10), y: 80, active: true}
        ];
        updateUI();
    }

    function updateUI() {
        document.getElementById('lvl').innerText = level;
        document.getElementById('gz').innerText = carrotsCollected;
        document.getElementById('sc').innerText = score;
    }

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    function showRiddle() {
        isPaused = true;
        const currentRiddles = riddlesByLevel[level];
        // בוחר חידה לפי מספר הגזרים שנאספו
        const r = currentRiddles[carrotsCollected] || currentRiddles[0];
        
        document.getElementById('riddle-box').style.display = 'block';
        document.getElementById('q').innerText = r.q;
        const ansDiv = document.getElementById('ans');
        ansDiv.innerHTML = '';
        
        r.a.forEach((text, i) => {
            const btn = document.createElement('button');
            btn.innerText = text;
            btn.onclick = () => {
                if(i === r.c) { score += 100; carrotsCollected++; }
                document.getElementById('riddle-box').style.display = 'none';
                isPaused = false;
                updateUI();
                requestAnimationFrame(gameLoop);
            };
            ansDiv.appendChild(btn);
        });
    }

    function update() {
        if(isPaused) return;

        if(keys['ArrowRight']) { player.vx = 6; player.faceDir = 1; }
        else if(keys['ArrowLeft']) { player.vx = -6; player.faceDir = -1; }
        else { player.vx *= 0.8; }

        if(player.onWall) {
            player.vy = keys['ArrowUp'] ? -5 : (keys['ArrowDown'] ? 5 : 0);
        } else {
            player.vy += 0.8; // גרביטציה
        }

        if((keys['Space'] || keys['ArrowUp']) && !player.onWall && player.vy === 0.8) {
            player.vy = -14;
        }

        if(keys['Space'] && player.onWall) {
            player.vy = -11;
            player.vx = -player.wallDir * 11;
            player.onWall = false;
        }

        player.x += player.vx;
        player.y += player.vy;

        let nowOnWall = false;
        platforms.forEach(p => {
            if(player.x < p.x + p.w && player.x + player.w > p.x && player.y < p.y + p.h && player.y + player.h > p.y) {
                if(!p.wall) {
                    if(player.vy > 0 && player.y + player.h - player.vy <= p.y) { player.y = p.y - player.h; player.vy = 0; }
                } else {
                    nowOnWall = true;
                    player.wallDir = (player.x < p.x) ? 1 : -1;
                    player.vx = 0;
                }
            }
        });
        player.onWall = nowOnWall;

        carrots.forEach(c => {
            if(c.active && Math.abs(player.x - c.x) < 30 && Math.abs(player.y - c.y) < 30) {
                c.active = false;
                showRiddle();
            }
        });

        if(carrotsCollected >= 3 && player.x > 800) {
            if(level < 5) { level++; initLevel(level); }
            else { alert("מלך הארנבים! ניצחת את כל החידות!"); level = 1; initLevel(1); }
        }

        if(player.y > 600) initLevel(level);
    }

    function drawRabbit(x, y, color, direction, hasBubble, message) {
        ctx.fillStyle = color;
        ctx.fillRect(x, y, 30, 40); // גוף
        ctx.fillRect(x + 5, y - 15, 8, 20); // אוזן
        ctx.fillRect(x + 17, y - 15, 8, 20); // אוזן
        ctx.fillStyle = "black";
        ctx.fillRect(direction === 1 ? x + 22 : x + 4, y + 10, 4, 4); // עין
        
        if(hasBubble) {
            ctx.fillStyle = "white";
            ctx.fillRect(x - 20, y - 60, 100, 30);
            ctx.fillStyle = "black";
            ctx.font = "bold 14px Arial";
            ctx.textAlign = "center";
            ctx.fillText(message, x + 30, y - 40);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // פלטפורמות
        platforms.forEach(p => {
            ctx.fillStyle = p.wall ? "#64748b" : "#334155";
            ctx.fillRect(p.x, p.y, p.w, p.h);
        });

        // גזרים
        carrots.forEach(c => {
            if(c.active) {
                ctx.fillStyle = "#f97316"; ctx.fillRect(c.x, c.y, 15, 20);
                ctx.fillStyle = "#22c55e"; ctx.fillRect(c.x + 2, c.y - 5, 11, 5);
            }
        });

        // פח אשפה
        ctx.fillStyle = (carrotsCollected >= 3) ? "#10b981" : "#4b5563";
        ctx.fillRect(840, 450, 45, 70);
        ctx.fillStyle = "#9ca3af"; ctx.fillRect(835, 445, 55, 8);
        if(carrotsCollected >= 3) {
            ctx.shadowBlur = 15; ctx.shadowColor = "#10b981";
            ctx.strokeStyle = "white"; ctx.strokeRect(840, 450, 45, 70);
            ctx.shadowBlur = 0;
        }

        // הארנב המעודד (NPC)
        drawRabbit(npc.x, npc.y, "#f472b6", 1, true, npc.msg);

        // הארנב הראשי
        drawRabbit(player.x, player.y, "white", player.faceDir, false, "");
    }

    function gameLoop() {
        if(!isPaused) {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
    }

    initLevel(1);
    gameLoop();
</script>

</body>
</html>
