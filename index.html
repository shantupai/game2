<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>הנוטאים - שלישיית VBNM!</title>
    <style>
        body { margin: 0; background: #020617; overflow: hidden; font-family: sans-serif; color: white; }
        canvas { display: block; margin: 0 auto; background: #0b0f19; border: 3px solid #334155; }
        #ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; font-size: 18px; font-weight: bold; pointer-events: none; text-shadow: 2px 2px 4px #000; }
        .p1 { color: #38bdf8; } .p2 { color: #f87171; } .p3 { color: #4ade80; }
        #legend { position: absolute; bottom: 10px; width: 100%; text-align: center; font-size: 14px; color: #94a3b8; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="p1">שחקן 1 (חצים): <span id="hp1">3</span> ❤️</div>
        <div class="p2">שחקן 2 (WASD): <span id="hp2">3</span> ❤️</div>
        <div class="p3">שחקן 3 (VBNM): <span id="hp3">3</span> ❤️</div>
        <div>🚀 שלב: <span id="lvl">1</span> | ✨ ניקוד: <span id="sc">0</span></div>
    </div>
    <div id="legend">שחקן 3: V=שמאל, N=ימין, B=קפיצה, M=שיגור</div>
    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
    canvas.width = 1100; canvas.height = 550;

    let totalScore = 0, level = 1, frames = 0;
    let superTimer = 0, ghostTimer = 0, shieldActive = false, doorActive = false;
    
    let pList = [
        { id: 'p1', x: 100, y: 450, w: 25, h: 25, xv: 0, yv: 0, hp: 3, invul: 0, active: true, color: "#38bdf8" },
        { id: 'p2', x: 150, y: 450, w: 25, h: 25, xv: 0, yv: 0, hp: 3, invul: 0, active: true, color: "#f87171" },
        { id: 'p3', x: 200, y: 450, w: 25, h: 25, xv: 0, yv: 0, hp: 3, invul: 0, active: true, color: "#4ade80" }
    ];

    let platforms = [], walls = [], spikes = [], aliens = [], items = [];
    let door = { x: 1000, y: 440, w: 50, h: 80 };

    function setupLevel() {
        doorActive = false;
        pList.forEach((p, i) => { p.x = 100 + i*50; p.y = 450; p.xv = 0; p.yv = 0; });
        platforms = [
            { x: 0, y: 520, w: 1100, h: 30 },
            { x: 200, y: 380, w: 200, h: 15 },
            { x: 700, y: 380, w: 200, h: 15 },
            { x: 450, y: 250, w: 200, h: 15 }
        ];
        walls = [{ x: 535, y: 100, w: 30, h: 150 }];
        spikes = [{ x: 400, y: 500, w: 40, h: 20 }, { x: 650, y: 500, w: 40, h: 20 }];
        
        aliens = [];
        for(let i=0; i<6; i++) {
            aliens.push({ x: 200 + Math.random()*700, y: 100 + Math.random()*350, start: 100, end: 1000, dir: 1, speed: 1.5 + level*0.2, alive: true });
        }
        spawnItems();
        document.getElementById('lvl').innerText = level;
    }

    function spawnItems() {
        items = [];
        for(let i=0; i<8; i++) items.push({ x: 100+Math.random()*900, y: 100+Math.random()*350, type: 'yellow', active: true });
        items.push({ x: 550, y: 80, type: 'blue', active: true });
        items.push({ x: 150, y: 100, type: 'pink', active: true });
        items.push({ x: 950, y: 100, type: 'purple', active: true });
        items.push({ x: 550, y: 480, type: 'green', active: true });
    }

    let keys = {};
    window.onkeydown = e => {
        keys[e.code] = true;
        // שיגורים
        if(e.code === 'ArrowDown' && pList[0].active) { pList[0].x = 100; pList[0].y = 450; }
        if(e.code === 'KeyS' && pList[1].active) { pList[1].x = 100; pList[1].y = 450; }
        if(e.code === 'KeyM' && pList[2].active) { pList[2].x = Math.random()*900; pList[2].y = 100; }
    };
    window.onkeyup = e => keys[e.code] = false;

    function handlePlayer(p, l, r, u) {
        if (!p.active) return;
        let s = (superTimer > 0) ? 9 : 5.5;
        if(keys[r]) p.xv = s; else if(keys[l]) p.xv = -s; else p.xv *= 0.8;

        let wall = false;
        walls.forEach(w => { if(p.x+p.w+5 > w.x && p.x-5 < w.x+w.w && p.y+p.h > w.y && p.y < w.y+w.h) { wall = true; p.yv = 1.2; }});
        if(!wall) p.yv += 0.55;
        p.x += p.xv; p.y += p.yv;

        platforms.forEach(plat => {
            if(p.x < plat.x+plat.w && p.x+p.w > plat.x && p.y+p.h > plat.y && p.y+p.h < plat.y+plat.h+10 && p.yv >= 0) {
                p.y = plat.y - p.h; p.yv = 0;
            }
        });

        if(keys[u] && p.yv === 0) p.yv = (superTimer > 0) ? -14 : -11;

        if (p.invul <= 0 && ghostTimer <= 0) {
            spikes.forEach(sp => { if (p.x < sp.x+sp.w && p.x+p.w > sp.x && p.y+p.h > sp.y) damage(p); });
            aliens.forEach(a => { if (a.alive && Math.abs(p.x - a.x) < 25 && Math.abs(p.y - a.y) < 25) damage(p); });
        }
        if (p.invul > 0) p.invul--;

        items.forEach(it => {
            if(it.active && Math.abs(p.x - it.x) < 30 && Math.abs(p.y - it.y) < 30) {
                it.active = false;
                if(it.type === 'yellow') totalScore += 10;
                else { 
                    if(it.type !== 'green') { aliens.forEach(a => a.alive = false); ctx.fillStyle="white"; ctx.fillRect(0,0,1100,550); }
                    if(it.type === 'blue') superTimer = 400;
                    if(it.type === 'pink') ghostTimer = 400;
                    if(it.type === 'purple') shieldActive = true;
                    if(it.type === 'green') pList.forEach(pl => { pl.hp = 3; pl.active = true; });
                }
            }
        });

        if (doorActive && Math.abs(p.x - door.x) < 40 && Math.abs(p.y - door.y) < 50) { level++; setupLevel(); }
        if (p.y > 600) { p.x = 100; p.y = 450; damage(p); }
    }

    function damage(p) {
        if (shieldActive) { shieldActive = false; p.invul = 60; return; }
        p.hp--; p.invul = 100;
        if (p.hp <= 0) { p.active = false; p.hp = 0; }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        frames++;
        if(superTimer > 0) superTimer--;
        if(ghostTimer > 0) ghostTimer--;

        handlePlayer(pList[0], 'ArrowLeft', 'ArrowRight', 'ArrowUp');
        handlePlayer(pList[1], 'KeyA', 'KeyD', 'KeyW');
        handlePlayer(pList[2], 'KeyV', 'KeyN', 'KeyB'); 

        // עולם
        ctx.fillStyle = "#1e293b"; platforms.forEach(plat => ctx.fillRect(plat.x, plat.y, plat.w, plat.h));
        ctx.fillStyle = "#ef4444"; spikes.forEach(s => ctx.fillRect(s.x, s.y, s.w, s.h));
        aliens.forEach(a => {
            if(!a.alive) return;
            a.x += a.dir * a.speed; if(a.x > a.end || a.x < a.start) a.dir *= -1;
            ctx.fillStyle = "#a855f7"; ctx.beginPath(); ctx.arc(a.x, a.y, 15, 0, 7); ctx.fill();
        });

        if (items.every(i => !i.active)) doorActive = true;
        items.forEach(it => {
            if(!it.active) return;
            let colors = { blue: "#38bdf8", pink: "#f472b6", purple: "#a855f7", green: "#4ade80", yellow: "#fbbf24" };
            ctx.fillStyle = colors[it.type]; ctx.beginPath(); ctx.arc(it.x, it.y, 10, 0, 7); ctx.fill();
        });

        if (doorActive) { ctx.fillStyle = "#8b5cf6"; ctx.fillRect(door.x, door.y, door.w, door.h); }

        pList.forEach(p => {
            if (!p.active) return;
            ctx.globalAlpha = (ghostTimer > 0) ? 0.4 : (p.invul > 0 && frames % 10 < 5 ? 0.3 : 1);
            ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.w, p.h);
            if (shieldActive) { ctx.strokeStyle = "white"; ctx.strokeRect(p.x-4, p.y-4, p.w+8, p.h+8); }
            ctx.globalAlpha = 1;
        });

        document.getElementById('sc').innerText = totalScore;
        document.getElementById('hp1').innerText = pList[0].hp;
        document.getElementById('hp2').innerText = pList[1].hp;
        document.getElementById('hp3').innerText = pList[2].hp;

        if(pList.every(p => !p.active)) {
            ctx.fillStyle = "white"; ctx.font = "30px Arial"; ctx.fillText("המשחק נגמר!", 450, 250);
        }
        requestAnimationFrame(draw);
    }

    setupLevel(); draw();
</script>
</body>
</html>
