<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>אוזן המן והצופן המתמטי</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle, #1e1b4b, #020617);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* אוזן המן משודרגת */
        .hamantash {
            width: 0; height: 0;
            border-left: 100px solid transparent;
            border-right: 100px solid transparent;
            border-bottom: 170px solid #d97706;
            position: relative;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .filling {
            position: absolute;
            top: 70px; left: -35px;
            width: 70px; height: 70px;
            background: #451a03;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 24px;
            box-shadow: inset 0 0 10px black;
        }

        #pattern-display {
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid #f59e0b;
            font-family: monospace;
            font-size: 20px;
            letter-spacing: 5px;
        }

        #ui-box {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            width: 90%; max-width: 450px;
            margin-top: 30px;
            border: 1px solid #334155;
        }

        input {
            padding: 12px; border-radius: 8px; border: none;
            width: 70%; margin: 10px 0; text-align: center; font-size: 18px;
        }

        button {
            padding: 10px 20px; background: #f59e0b; color: #451a03;
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold;
        }

        .mode-badge {
            background: #ef4444; padding: 5px 10px; border-radius: 5px;
            font-size: 12px; margin-bottom: 10px; display: inline-block;
        }
    </style>
</head>
<body>

    <div class="hamantash" id="hero">
        <div class="filling" id="secret-number">?</div>
    </div>

    <div id="pattern-display">הרצף שנחשף: <span id="seq-list">---</span></div>

    <div id="ui-box">
        <div id="game-mode" class="mode-badge">מצב: חידון פורים</div>
        <h2 id="msg">טוען...</h2>
        <input type="text" id="user-input" placeholder="תשובה..." autocomplete="off">
        <br>
        <button onclick="handleAction()">שלח</button>
        <div id="result" style="margin-top:15px; font-weight:bold; color:#fbbf24;"></div>
    </div>

<script>
    // שאלות פורים עם "ערך מספרי" לכל שאלה שיוצר דפוס
    // שלב 1: דפוס של +5 (5, 10, 15)
    // שלב 2: דפוס של כפול 2 (2, 4, 8)
    const questions = [
        { q: "מי המלכה שהחליפה את ושתי?", a: "אסתר", val: 5 },
        { q: "באיזו עיר גר המלך?", a: "שושן", val: 10 },
        { q: "מי היה הרשע שרצה להשמיד את היהודים?", a: "המן", val: 15 },
        // פה יבוא אתגר דפוס 1
        { q: "מה נותנים לעניים בפורים? (2 מילים)", a: "מתנות לאביונים", val: 2 },
        { q: "איך קראו לסוס עליו רכב מרדכי? (סתם, מי רכב על הסוס?)", a: "מרדכי", val: 4 },
        { q: "באיזה חודש חל פורים?", a: "אדר", val: 8 }
        // פה יבוא אתגר דפוס 2
    ];

    const costumes = [
        "תחפושת 'מכונת מסטיקים': הדבק כדורי צמר צבעוניים על חולצה לבנה!",
        "תחפושת 'שקית במבה': צייר על חולצה צהובה גדולה והוסף כובע תינוק.",
        "תחפושת 'קקטוס': לבש ירוק והדבק אזיקונים לבנים מקופלים כקוצים."
    ];

    let currentIdx = 0;
    let sequence = [];
    let isPatternMode = false;

    function init() {
        showQuestion();
    }

    function showQuestion() {
        isPatternMode = false;
        document.getElementById('game-mode').innerText = "מצב: חידון פורים";
        document.getElementById('game-mode').style.background = "#3b82f6";
        document.getElementById('msg').innerText = questions[currentIdx].q;
        document.getElementById('user-input').value = "";
        document.getElementById('secret-number').innerText = "?";
    }

    function showPatternChallenge() {
        isPatternMode = true;
        document.getElementById('game-mode').innerText = "מצב: פענוח דפוס!";
        document.getElementById('game-mode').style.background = "#ef4444";
        document.getElementById('msg').innerText = "גלה את הדפוס! מה המספר הבא ברצף?";
        document.getElementById('user-input').value = "";
        document.getElementById('user-input').placeholder = "הכנס מספר...";
    }

    function handleAction() {
        const input = document.getElementById('user-input').value.trim();
        const res = document.getElementById('result');

        if (!isPatternMode) {
            // בדיקת תשובה לחידון
            if (input === questions[currentIdx].a) {
                const val = questions[currentIdx].val;
                sequence.push(val);
                document.getElementById('secret-number').innerText = val;
                document.getElementById('seq-list').innerText = sequence.join(', ');
                res.innerText = "נכון! המספר הסודי נחשף.";
                
                currentIdx++;
                
                // האם הגענו לסוף רצף של 3 שאלות?
                if (currentIdx % 3 === 0) {
                    setTimeout(showPatternChallenge, 2000);
                } else {
                    setTimeout(showQuestion, 2000);
                }
            } else {
                res.innerText = "טעות בחידון, נסה שוב!";
            }
        } else {
            // בדיקת דפוס מתמטי
            let last = sequence[sequence.length - 1];
            let prev = sequence[sequence.length - 2];
            let expected;

            // חישוב הלוגיקה לפי השלב
            if (sequence[0] === 5) expected = last + 5; // דפוס חשבוני
            if (sequence[0] === 2) expected = last * 2; // דפוס הנדסי

            if (parseInt(input) === expected) {
                const costume = costumes[Math.floor(Math.random()*costumes.length)];
                res.innerHTML = "פיצחת את הדפוס! 🎉<br>רעיון לתחפושת: " + costume;
                sequence = []; // איפוס לשלב הבא
                document.getElementById('seq-list').innerText = "---";
                if (currentIdx < questions.length) {
                    setTimeout(showQuestion, 5000);
                } else {
                    document.getElementById('msg').innerText = "ניצחת את אוזן המן! חג שמח!";
                }
            } else {
                res.innerText = "זה לא הדפוס... תסתכל על המספרים!";
            }
        }
    }

    init();
</script>
</body>
</html>
