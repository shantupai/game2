<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>הנוטאים - התגנבות רוח רפאים</title>
    <style>
        body { margin: 0; background: #020617; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; margin: 0 auto; background: #020617; }
        #stats { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; color: white; font-size: 20px; font-weight: bold; pointer-events: none; text-shadow: 2px 2px 4px #000; }
        #bars { position: absolute; top: 45px; left: 50%; transform: translateX(-50%); width: 220px; display: flex; flex-direction: column; gap: 5px; }
        .bar-bg { width: 100%; height: 8px; background: #1e293b; border-radius: 4px; display: none; overflow: hidden; border: 1px solid white; }
        #super-progress { height: 100%; background: #38bdf8; width: 0%; transition: width 0.1s linear; }
        #ghost-progress { height: 100%; background: #f472b6; width: 0%; transition: width 0.1s linear; }
        .hint { position: absolute; bottom: 10px; width: 100%; text-align: center; color: #94a3b8; font-size: 16px; }
    </style>
</head>
<body>
    <div id="stats">
        <div>🚀 שלב: <span id="lvl">1</span></div>
        <div>❤️ חיים: <span id="hp">3</span></div>
        <div id="shield-stat" style="color: #a78bfa;">🛡️ מגן: <span id="sh">אין</span></div>
        <div>✨ כוכבים: <span id="sc">0</span></div>
    </div>
    <div id="bars">
        <div id="super-bar" class="bar-bg" style="border-color: #38bdf8;"><div id="super-progress"></div></div>
        <div id="ghost-bar" class="bar-bg" style="border-color: #f472b6;"><div id="ghost-progress"></div></div>
    </div>
    <div class="hint">אסוף כוכבים כדי להעלים חייזרים! | 🌸 כוכב ורוד = בלתי נראה לחייזרים</div>
    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
    canvas.width = 1100; canvas.height = 550;

    let level = 1, score = 0, health = 3, frames = 0;
    let player = { x: 50, y: 400, w: 25, h: 25, xv: 0, yv: 0, jumps: 0, invul: 0, superTimer: 0, ghostTimer: 0, maxSuper: 400, maxGhost: 300, hasShield: false };
    let platforms = [], walls = [], stars = [], aliens = [], blueStar = null, purpleStar = null, pinkStar = null, spikes = [], particles = [], door = {};
    let keys = {};

    function setupLevel() {
        platforms = []; walls = []; stars = []; spikes = []; aliens = []; particles = [];
        player.x = 50; player.y = 450; player.xv = 0; player.yv = 0; player.superTimer = 0; player.ghostTimer = 0; player.hasShield = false;
        
        platforms.push({ x: 0, y: 520, w: 1100, h: 30 }); 
        walls.push({ x: 350, y: 150, w: 30, h: 300 }, { x: 750, y: 150, w: 30, h: 300 });

        for(let i=0; i<14; i++) {
            let px = 100 + (i * 60) + (Math.random() * 50);
            let py = 150 + (Math.random() * 300);
            platforms.push({ x: px, y: py, w: 90, h: 12 });
            if(i % 4 === 0 && i > 0) spikes.push({ x: px + 25, y: py - 8, w: 40 }); 
        }

        for(let i=0; i < 6 + level; i++) {
            aliens.push({ x: 200 + Math.random()*800, y: 50 + Math.random()*400, baseY: 0, alive: true, offset: Math.random()*Math.PI*2, speed: 0.05 + Math.random()*0.02 });
            aliens[i].baseY = aliens[i].y;
        }

        for(let i=0; i<5; i++) stars.push({ x: 100 + Math.random()*900, y: 100 + Math.random()*300, collected: false });
        blueStar = { x: 550, y: 250, collected: false };
        purpleStar = { x: 200 + Math.random()*700, y: 100 + Math.random()*200, collected: false };
        pinkStar = { x: 100 + Math.random()*800, y: 50 + Math.random()*150, collected: false };
        door = { x: 1020, y: 60, w: 40, h: 60 };
        platforms.push({ x: 1000, y: 120, w: 80, h: 12 });

        document.getElementById('lvl').innerText = level;
    }

    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    function createExplosion(x, y, color) {
        for(let i=0; i<10; i++) particles.push({ x, y, xv: (Math.random()-0.5)*8, yv: (Math.random()-0.5)*8, life: 20, color });
    }

    function removeAliens(count) {
        let removed = 0;
        for(let a of aliens) { if(a.alive && removed < count) { a.alive = false; removed++; createExplosion(a.x + 15, a.y + 15, "#f43f5e"); } }
    }

    function update() {
        frames++;
        if(player.invul > 0) player.invul--;
        if(player.superTimer > 0) player.superTimer--;
        if(player.ghostTimer > 0) player.ghostTimer--;

        document.getElementById('sh').innerText = player.hasShield ? "יש" : "אין";
        
        // עדכון פסי התקדמות
        const superBar = document.getElementById('super-bar');
        const superProgress = document.getElementById('super-progress');
        if(player.superTimer > 0) {
            superBar.style.display = 'block';
            superProgress.style.width = (player.superTimer / player.maxSuper * 100) + '%';
        } else { superBar.style.display = 'none'; }

        const ghostBar = document.getElementById('ghost-bar');
        const ghostProgress = document.getElementById('ghost-progress');
        if(player.ghostTimer > 0) {
            ghostBar.style.display = 'block';
            ghostProgress.style.width = (player.ghostTimer / player.maxGhost * 100) + '%';
        } else { ghostBar.style.display = 'none'; }

        // תנועה ופיזיקה
        if(keys.ArrowRight) player.xv = 6; else if(keys.ArrowLeft) player.xv = -6; else player.xv *= 0.8;
        let touchingWall = null;
        walls.forEach(w => { if(player.x + player.w + 5 > w.x && player.x - 5 < w.x + w.w && player.y < w.y + w.h && player.y + player.h > w.y) touchingWall = (player.x < w.x) ? "left" : "right"; });
        if(touchingWall && player.yv > 0) { player.yv = 2.5; player.jumps = 0; } else player.yv += 0.55;

        if((keys.Space || keys.ArrowUp) && !player.jumpLock) {
            if(touchingWall) { player.yv = -12; player.xv = (touchingWall === "left") ? -12 : 12; player.jumpLock = true; }
            else if(player.jumps < 2) { player.yv = -11; player.jumps++; player.jumpLock = true; }
        }
        if(!keys.Space && !keys.ArrowUp) player.jumpLock = false;

        player.x += player.xv; player.y += player.yv;

        // התנגשויות
        walls.forEach(w => { if(player.x < w.x+w.w && player.x+player.w > w.x && player.y < w.y+w.h && player.y+player.h > w.y) { if(player.xv > 0 && player.x < w.x) player.x = w.x - player.w; else if(player.xv < 0 && player.x > w.x) player.x = w.x + w.w; }});
        platforms.forEach(p => { if(player.x < p.x+p.w && player.x+player.w > p.x && player.y+player.h > p.y && player.y+player.h < p.y+p.h+12 && player.yv >= 0) { player.y = p.y - player.h; player.yv = 0; player.jumps = 0; }});

        // בדיקת איסוף כוכבים
        stars.forEach(s => { if(!s.collected && Math.abs(player.x-s.x)<30 && Math.abs(player.y-s.y)<30){ s.collected=true; score+=50; removeAliens(1); }});
        if(!blueStar.collected && Math.abs(player.x-blueStar.x)<30 && Math.abs(player.y-blueStar.y)<30) { blueStar.collected=true; player.superTimer=player.maxSuper; score+=100; removeAliens(3); }
        if(!purpleStar.collected && Math.abs(player.x-purpleStar.x)<30 && Math.abs(player.y-purpleStar.y)<30) { purpleStar.collected=true; player.hasShield=true; score+=100; removeAliens(3); }
        if(!pinkStar.collected && Math.abs(player.x-pinkStar.x)<30 && Math.abs(player.y-pinkStar.y)<30) { pinkStar.collected=true; player.ghostTimer=player.maxGhost; score+=150; removeAliens(2); }

        // אינטראקציה עם חייזרים
        aliens.forEach(a => {
            if(!a.alive) return;
            a.y = a.baseY + Math.sin(frames * a.speed + a.offset) * 35;
            if(Math.abs(player.x - a.x) < 25 && Math.abs(player.y - a.y) < 25) {
                if(player.superTimer > 0) { a.alive = false; createExplosion(a.x, a.y, "orange"); score+=50; }
                else if(player.ghostTimer <= 0) handleDamage(); // נזק רק אם לא במצב רוח רפאים
            }
        });

        // קוצים פוגעים תמיד (גם במצב רוח רפאים)
        spikes.forEach(s => { if(player.superTimer <= 0 && player.invul <= 0 && player.x + player.w - 5 > s.x && player.x + 5 < s.x + s.w && player.y + player.h > s.y && player.y + player.h < s.y + 15) handleDamage(); });

        function handleDamage() {
            if(player.invul > 0) return;
            if(player.hasShield) { player.hasShield = false; player.invul = 60; player.yv = -8; }
            else { health--; player.invul = 80; player.yv = -10; if(health <= 0) { alert("נסה שוב!"); level=1; health=3; setupLevel(); }}
        }

        particles.forEach((p, i) => { p.x+=p.xv; p.y+=p.yv; p.life--; if(p.life<=0) particles.splice(i,1); });
        if(Math.abs(player.x-door.x)<40 && Math.abs(player.y-door.y)<50) { level++; setupLevel(); }
        if(player.y > 600) { health--; setupLevel(); }
        
        document.getElementById('sc').innerText = score;
        document.getElementById('hp').innerText = health;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        walls.forEach(w => { ctx.fillStyle = "#475569"; ctx.fillRect(w.x, w.y, w.w, w.h); });
        platforms.forEach(p => { ctx.fillStyle = "#1e293b"; ctx.fillRect(p.x, p.y, p.w, p.h); ctx.fillStyle = "#10b981"; ctx.fillRect(p.x, p.y, p.w, 3); });
        ctx.fillStyle = "#f87171";
        spikes.forEach(s => { for(let i=0; i<s.w; i+=10) { ctx.beginPath(); ctx.moveTo(s.x+i, s.y+10); ctx.lineTo(s.x+i+5, s.y); ctx.lineTo(s.x+i+10, s.y+10); ctx.fill(); }});

        // חייזרים
        aliens.forEach(a => {
            if(!a.alive) return;
            ctx.fillStyle = "#f43f5e"; ctx.beginPath(); ctx.ellipse(a.x+15, a.y+15, 15, 10, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(a.x+15, a.y+15, 5, 0, Math.PI*2); ctx.fill();
        });

        // כוכבים
        stars.forEach(s => { if(!s.collected) { ctx.fillStyle = "#fbbf24"; ctx.beginPath(); ctx.arc(s.x, s.y, 8, 0, Math.PI*2); ctx.fill(); }});
        if(!blueStar.collected) { ctx.fillStyle = "#38bdf8"; ctx.shadowBlur = 10; ctx.shadowColor = "cyan"; ctx.beginPath(); ctx.arc(blueStar.x, blueStar.y, 12, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0; }
        if(!purpleStar.collected) { ctx.fillStyle = "#a78bfa"; ctx.shadowBlur = 10; ctx.shadowColor = "#a78bfa"; ctx.beginPath(); ctx.arc(purpleStar.x, purpleStar.y, 12, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0; }
        if(!pinkStar.collected) { ctx.fillStyle = "#f472b6"; ctx.shadowBlur = 10; ctx.shadowColor = "#f472b6"; ctx.beginPath(); ctx.arc(pinkStar.x, pinkStar.y, 12, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0; }
        
        ctx.fillStyle = "#8b5cf6"; ctx.fillRect(door.x, door.y, door.w, door.h);
        particles.forEach(p => { ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 3, 3); });

        // שחקן
        ctx.fillStyle = player.superTimer > 0 ? (frames % 6 < 3 ? "#38bdf8" : "#fff") : (player.ghostTimer > 0 ? "transparent" : "#38bdf8");
        if(player.invul > 0 && frames % 10 < 5) ctx.globalAlpha = 0.3;
        
        // אם בלתי נראה, צייר רק קו מתאר
        if(player.ghostTimer > 0) {
            ctx.strokeStyle = frames % 10 < 5 ? "#f472b6" : "rgba(244, 114, 182, 0.5)";
            ctx.lineWidth = 2;
            ctx.strokeRect(player.x, player.y, player.w, player.h);
        } else {
            ctx.fillRect(player.x, player.y, player.w, player.h);
        }

        // מגן
        if(player.hasShield) { ctx.strokeStyle = "#a78bfa"; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(player.x+player.w/2, player.y+player.h/2, 25, 0, Math.PI*2); ctx.stroke(); }
        ctx.globalAlpha = 1.0;
    }

    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
    setupLevel();
    gameLoop();
</script>
</body>
</html>
