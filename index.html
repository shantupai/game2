<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>דובי העצים והחידות</title>
    <style>
        body { margin: 0; background: #064e3b; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; text-align: center; }
        canvas { background: #14532d; display: block; margin: 20px auto; border: 6px solid #065f46; border-radius: 15px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        #ui { font-size: 26px; font-weight: bold; margin-top: 15px; display: flex; justify-content: center; gap: 40px; }
        #riddle-box {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fef3c7; color: #78350f; padding: 30px; border-radius: 20px;
            box-shadow: 0 0 100px rgba(0,0,0,0.9); z-index: 100; width: 360px; border: 6px solid #d97706;
        }
        button { width: 100%; padding: 12px; margin: 10px 0; cursor: pointer; font-weight: bold; background: #d97706; color: white; border: none; border-radius: 10px; font-size: 18px; }
        button:hover { background: #b45309; }
    </style>
</head>
<body>

<div id="ui">
    <div style="color: #fbbf24;">🌳 שלב: <span id="lvl">1</span>/5</div>
    <div style="color: #fcd34d;">🪵 עצים: <span id="gz">0</span>/3</div>
    <div style="color: #6ee7b7;">✨ ניקוד: <span id="sc">0</span></div>
</div>

<div id="riddle-box">
    <h2 id="q" style="margin-top:0">חידת היער!</h2>
    <div id="ans"></div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 900; canvas.height = 550;

    let level = 1, score = 0, woodCollected = 0, isPaused = false;
    let player = { x: 50, y: 450, w: 40, h: 40, vx: 0, vy: 0, onWall: false, wallDir: 0, faceDir: 1 };
    let npc = { x: 120, y: 460, msg: "" };
    let platforms = [], logs = [];
    const keys = {};

    const riddlesByLevel = {
        1: [
            {q: "מה יש לו שיניים אבל לא נושך?", a: ["מסרק", "מפתח", "מסור"], c: 0},
            {q: "מה שייך לך אבל אחרים משתמשים בו יותר?", a: ["השם שלך", "הטלפון", "הכסף"], c: 0},
            {q: "מה תמיד בא אבל אף פעם לא מגיע?", a: ["האוטובוס", "מחר", "החופש"], c: 1}
        ],
        2: [
            {q: "מה נרטב כשמייבשים אותו?", a: ["ספוג", "מגבת", "ים"], c: 1},
            {q: "למי יש רגליים אבל הוא לא יכול ללכת?", a: ["שולחן", "נחש", "כיסא"], c: 0},
            {q: "מה עולה ולא יורד לעולם?", a: ["בלון", "הגיל שלך", "מטוס"], c: 1}
        ],
        3: [
            {q: "מה מלא חורים אבל עדיין מחזיק מים?", a: ["מסננת", "ספוג", "דלי"], c: 1},
            {q: "מה נשבר כשמדברים עליו?", a: ["זכוכית", "הבטחה", "שתיקה"], c: 2},
            {q: "מה תמיד לפניך אבל אתה לא רואה?", a: ["העתיד", "הגב", "האף"], c: 0}
        ],
        4: [
            {q: "מה מתחיל ב-ת', נגמר ב-ת' ויש בו ת'?", a: ["תות", "תיבת דואר", "תחנה"], c: 1},
            {q: "מה רץ אבל אין לו רגליים?", a: ["זמן", "נהר", "שניהם"], c: 2},
            {q: "מה יש לו ראש וזנב אבל אין לו גוף?", a: ["נחש", "מטבע", "לטאה"], c: 1}
        ],
        5: [
            {q: "מה נהיה גבוה יותר ככל שמוציאים ממנו יותר?", a: ["בור", "בניין", "עץ"], c: 0},
            {q: "מה יש לו יד אבל לא יכול למחוא כפיים?", a: ["שעון", "בובה", "כפפה"], c: 0},
            {q: "מי אני? אם תאכל אותי אני אחיה, אם תשקה אותי אני אמות.", a: ["צמח", "אש", "רעב"], c: 1}
        ]
    };

    const npcMessages = ["קדימה דובי, אתה יכול!", "אל תפחד מהגובה!", "עוד קצת והפח נפתח!", "איזה דובי חכם!", "שלב אחרון, אלוף!"];

    function initLevel(num) {
        woodCollected = 0;
        player.x = 50; player.y = 450; 
        player.vx = 0; player.vy = 0; // איפוס מהירות כדי למנוע נפילה
        npc.msg = npcMessages[num-1];
        
        platforms = [
            {x: 0, y: 520, w: 900, h: 30, wall: false},
            {x: 350, y: 120, w: 45, h: 400, wall: true},
            {x: 700, y: 50, w: 45, h: 350, wall: true}
        ];

        for(let i=0; i<3; i++) platforms.push({x: 120 + i*220, y: 400 - i*100, w: 130, h: 15, wall: false});

        logs = [
            {x: 160, y: 350, active: true},
            {x: 390, y: 180, active: true},
            {x: 740, y: 80, active: true}
        ];
        updateUI();
    }

    function updateUI() {
        document.getElementById('lvl').innerText = level;
        document.getElementById('gz').innerText = woodCollected;
        document.getElementById('sc').innerText = score;
    }

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    function showRiddle() {
        isPaused = true;
        player.vx = 0; player.vy = 0; // עצירה מוחלטת של הדובי
        const currentRiddles = riddlesByLevel[level];
        const r = currentRiddles[woodCollected] || currentRiddles[0];
        
        document.getElementById('riddle-box').style.display = 'block';
        document.getElementById('q').innerText = r.q;
        const ansDiv = document.getElementById('ans');
        ansDiv.innerHTML = '';
        
        r.a.forEach((text, i) => {
            const btn = document.createElement('button');
            btn.innerText = text;
            btn.onclick = () => {
                if(i === r.c) { score += 100; woodCollected++; }
                document.getElementById('riddle-box').style.display = 'none';
                isPaused = false;
                updateUI();
                requestAnimationFrame(gameLoop);
            };
            ansDiv.appendChild(btn);
        });
    }

    function update() {
        if(isPaused) return;

        if(keys['ArrowRight']) { player.vx = 5; player.faceDir = 1; }
        else if(keys['ArrowLeft']) { player.vx = -5; player.faceDir = -1; }
        else { player.vx *= 0.8; }

        if(player.onWall) {
            player.vy = keys['ArrowUp'] ? -4 : (keys['ArrowDown'] ? 4 : 0);
        } else {
            player.vy += 0.7; 
        }

        if((keys['Space'] || keys['ArrowUp']) && !player.onWall && Math.abs(player.vy) < 1) {
            player.vy = -13;
        }

        if(keys['Space'] && player.onWall) {
            player.vy = -10;
            player.vx = -player.wallDir * 11;
            player.onWall = false;
        }

        player.x += player.vx;
        player.y += player.vy;

        let nowOnWall = false;
        platforms.forEach(p => {
            if(player.x < p.x + p.w && player.x + player.w > p.x && player.y < p.y + p.h && player.y + player.h > p.y) {
                if(!p.wall) {
                    if(player.vy > 0 && player.y + player.h - player.vy <= p.y) { player.y = p.y - player.h; player.vy = 0; }
                } else {
                    nowOnWall = true;
                    player.wallDir = (player.x < p.x) ? 1 : -1;
                    player.vx = 0;
                }
            }
        });
        player.onWall = nowOnWall;

        logs.forEach(l => {
            if(l.active && Math.abs(player.x - l.x) < 40 && Math.abs(player.y - l.y) < 40) {
                l.active = false;
                showRiddle();
            }
        });

        if(woodCollected >= 3 && player.x > 820) {
            if(level < 5) { level++; initLevel(level); }
            else { alert("כל הכבוד דובי! סיימת את כל היער!"); level = 1; initLevel(1); }
        }

        if(player.y > 600) initLevel(level);
    }

    function drawBear(x, y, color, size, msg) {
        ctx.fillStyle = color;
        // גוף
        ctx.beginPath(); ctx.arc(x + size/2, y + size/2, size/2, 0, Math.PI*2); ctx.fill();
        // אוזניים
        ctx.beginPath(); ctx.arc(x + size/4, y + 5, size/5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(x + size*0.75, y + 5, size/5, 0, Math.PI*2); ctx.fill();
        // עיניים
        ctx.fillStyle = "black";
        ctx.beginPath(); ctx.arc(x + size*0.3, y + size*0.4, 3, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(x + size*0.7, y + size*0.4, 3, 0, Math.PI*2); ctx.fill();
        // אף
        ctx.beginPath(); ctx.arc(x + size/2, y + size*0.6, 4, 0, Math.PI*2); ctx.fill();

        if(msg) {
            ctx.fillStyle = "white";
            ctx.fillRect(x - 20, y - 60, 120, 30);
            ctx.fillStyle = "black";
            ctx.font = "bold 14px Arial";
            ctx.textAlign = "center";
            ctx.fillText(msg, x + 40, y - 40);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // פלטפורמות
        platforms.forEach(p => {
            ctx.fillStyle = p.wall ? "#3f2b1d" : "#064e3b";
            ctx.fillRect(p.x, p.y, p.w, p.h);
        });

        // בולי עץ
        logs.forEach(l => {
            if(l.active) {
                ctx.fillStyle = "#78350f";
                ctx.fillRect(l.x, l.y, 30, 15);
                ctx.strokeStyle = "#451a03";
                ctx.strokeRect(l.x, l.y, 30, 15);
            }
        });

        // פח אשפה
        ctx.fillStyle = (woodCollected >= 3) ? "#10b981" : "#4b5563";
        ctx.fillRect(840, 450, 45, 70);
        ctx.fillStyle = "#9ca3af"; ctx.fillRect(835, 445, 55, 8);

        // הדובי הקטן (מעודד)
        drawBear(npc.x, npc.y, "#f472b6", 30, npc.msg);

        // הדובי הראשי (שחקן)
        drawBear(player.x, player.y, "#92400e", 40, "");
    }

    function gameLoop() {
        if(!isPaused) {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
    }

    initLevel(1);
    gameLoop();
</script>

</body>
</html>
