<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>הנוטאים - מתקפת המנצ'יס!</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; margin: 0 auto; background: #0b0f19; border: 2px solid #334; }
        #ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; 
              color: white; font-size: 18px; font-weight: bold; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <div style="color: #38bdf8;">🍟 צ'יפס (1): <span id="hp1">3</span> ❤️</div>
        <div style="color: #f87171;">🍕 פיצה (2): <span id="hp2">3</span> ❤️</div>
        <div style="color: #4ade80;">🍔 המבורגר (3): <span id="hp3">3</span> ❤️</div>
        <div>🚀 שלב: <span id="lvl">1</span> | ✨ ניקוד: <span id="sc">0</span></div>
    </div>
    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
    canvas.width = 1100; canvas.height = 550;

    let totalScore = 0, level = 1, frames = 0;
    let superTimer = 0, ghostTimer = 0, shield = false, doorActive = false;
    
    // הגדרת 3 שחקנים (האוכל)
    let players = [
        { x: 100, y: 450, w: 30, h: 30, xv: 0, yv: 0, jumps: 0, hp: 3, invul: 0, active: true, type: 'fries' },
        { x: 150, y: 450, w: 30, h: 30, xv: 0, yv: 0, jumps: 0, hp: 3, invul: 0, active: true, type: 'pizza' },
        { x: 200, y: 450, w: 30, h: 30, xv: 0, yv: 0, jumps: 0, hp: 3, invul: 0, active: true, type: 'burger' }
    ];

    let platforms = [], spikes = [], aliens = [], items = [];

    function setupLevel() {
        doorActive = false;
        players.forEach((p, i) => { p.x = 100 + i*50; p.y = 450; p.xv = 0; p.yv = 0; p.jumps = 0; p.invul = 60; });
        platforms = [
            { x: 0, y: 520, w: 1100, h: 30 },
            { x: 200, y: 350, w: 200, h: 15 },
            { x: 700, y: 350, w: 200, h: 15 },
            { x: 450, y: 200, w: 200, h: 15 }
        ];
        spikes = [{ x: 420, y: 500, w: 40, h: 20 }, { x: 640, y: 500, w: 40, h: 20 }];
        
        // יותר חייזרים כי עכשיו קשה יותר להרוג אותם
        aliens = [];
        for(let i=0; i < 6 + level; i++) {
            aliens.push({ x: 300+Math.random()*600, y: 100+Math.random()*300, dir: 1, speed: 1.2, alive: true });
        }
        spawnItems();
        document.getElementById('lvl').innerText = level;
    }

    function spawnItems() {
        items = [];
        for(let i=0; i<10; i++) items.push({ x: 100+Math.random()*900, y: 50+Math.random()*300, type: 'yellow', active: true });
        ['blue', 'pink', 'purple', 'green'].forEach(t => items.push({ x: 100+Math.random()*900, y: 50+Math.random()*300, type: t, active: true }));
    }

    // פונקציית שיגור למקום בטוח
    function safeTeleport(p) {
        let attempts = 0;
        while (attempts < 30) {
            let targetX = 50 + Math.random() * 1000;
            let targetY = 450;
            let nearSpike = spikes.some(s => Math.abs(targetX - s.x) < 70);
            let nearAlien = aliens.some(a => a.alive && Math.abs(targetX - a.x) < 90);
            if (!nearSpike && !nearAlien) {
                p.x = targetX; p.y = targetY; p.invul = 60; p.yv = 0;
                break;
            }
            attempts++;
        }
    }

    // פונקציית פיצוץ חייזרים חלקית (רק 3)
    function killSomeAliens() {
        let aliveAliens = aliens.filter(a => a.alive);
        ctx.fillStyle = "rgba(255,255,255,0.5)"; // הבזק חלש
        ctx.fillRect(0,0,1100,550);
        
        for (let i = 0; i < 3 && i < aliveAliens.length; i++) {
            let randomIndex = Math.floor(Math.random() * aliveAliens.length);
            aliveAliens[randomIndex].alive = false;
            // הסרה מהמערך הזמני כדי לא לבחור אותו שוב
            aliveAliens.splice(randomIndex, 1);
        }
    }

    let keys = {};
    window.onkeydown = e => {
        keys[e.code] = true;
        if(e.code === 'ArrowDown' && players[0].active) safeTeleport(players[0]);
        if(e.code === 'KeyS' && players[1].active) safeTeleport(players[1]);
        if(e.code === 'KeyM' && players[2].active) safeTeleport(players[2]);
    };
    window.onkeyup = e => keys[e.code] = false;

    // פונקציית ציור דמויות (האוכל)
    function drawPlayer(p) {
        if (!p.active) return;
        ctx.save();
        ctx.translate(p.x, p.y);
        
        // הבהוב בחסינות
        ctx.globalAlpha = ghostTimer > 0 ? 0.4 : (p.invul > 0 && frames % 6 < 3 ? 0.3 : 1);

        if (p.type === 'fries') { // צ'יפס
            ctx.fillStyle = "#fbbf24"; ctx.fillRect(0, 5, 25, 20); // קופסה
            ctx.fillStyle = "#fef08a"; // צ'יפסים
            ctx.fillRect(5, -5, 4, 15); ctx.fillRect(11, -8, 4, 18); ctx.fillRect(17, -4, 4, 14);
        } else if (p.type === 'pizza') { // פיצה
            ctx.fillStyle = "#facc15"; // בצק
            ctx.beginPath(); ctx.moveTo(12.5, 0); ctx.lineTo(25, 25); ctx.lineTo(0, 25); ctx.closePath(); ctx.fill();
            ctx.fillStyle = "#ef4444"; // פפרוני
            ctx.beginPath(); ctx.arc(7, 18, 3, 0, 7); ctx.arc(18, 18, 3, 0, 7); ctx.arc(12.5, 10, 3, 0, 7); ctx.fill();
        } else if (p.type === 'burger') { // המבורגר
            ctx.fillStyle = "#b45309"; ctx.fillRect(0, 8, 25, 12); // בשר
            ctx.fillStyle = "#f59e0b"; // לחמנייה עליונה
            ctx.beginPath(); ctx.arc(12.5, 10, 12.5, 3.14, 0); ctx.fill();
            ctx.fillRect(0, 18, 25, 7); // לחמנייה תחתונה
            ctx.fillStyle = "#16a34a"; ctx.fillRect(0, 6, 25, 3); // חסה
        }
        
        if(shield) { ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.strokeRect(-3, -10, p.w+6, p.h+15); }
        ctx.restore();
    }

    function updatePlayer(p, l, r, u) {
        if (!p.active) return;
        let speed = (superTimer > 0) ? 10 : 6.5;
        if(keys[r]) p.xv = speed; else if(keys[l]) p.xv = -speed; else p.xv *= 0.85;
        
        p.yv += 0.28; // כבידת ירח
        p.x += p.xv; p.y += p.yv;

        platforms.forEach(plat => {
            if(p.x < plat.x+plat.w && p.x+p.w > plat.x && p.y+p.h > plat.y && p.y+p.h < plat.y+plat.h+10 && p.yv >= 0) {
                p.y = plat.y - p.h; p.yv = 0; p.jumps = 0;
            }
        });

        // קפיצת ירח משולשת
        if(keys[u] && !p.jumpLock) {
            if(p.yv >= -2 || p.jumps < 3) {
                p.yv = -12; 
                p.jumps++;
                p.jumpLock = true;
            }
        }
        if(!keys[u]) p.jumpLock = false;

        if (p.invul <= 0 && ghostTimer <= 0) {
            spikes.forEach(s => { if(p.x < s.x+s.w && p.x+p.w > s.x && p.y+p.h > s.y) hurt(p); });
            aliens.forEach(a => { if(a.alive && Math.abs(p.x-a.x)<30 && Math.abs(p.y-a.y)<30) hurt(p); });
        }
        if(p.invul > 0) p.invul--;

        // איסוף פריטים
        items.forEach(it => {
            if(it.active && Math.abs(p.x-it.x)<40 && Math.abs(p.y-it.y)<40) {
                it.active = false;
                if(it.type === 'yellow') totalScore += 10;
                else {
                    if(it.type !== 'green') { killSomeAliens(); } // פיצוץ חלקי!
                    if(it.type === 'blue') superTimer = 400;
                    if(it.type === 'pink') ghostTimer = 400;
                    if(it.type === 'purple') shield = true;
                    if(it.type === 'green') players.forEach(pl => { pl.hp = 3; pl.active = true; });
                }
            }
        });

        if(doorActive && p.x > 1000 && p.y > 400) { level++; setupLevel(); }
        if(p.y > 600) { p.x = 100; p.y = 450; hurt(p); }
    }

    function hurt(p) {
        if(shield) { shield = false; p.invul = 60; return; }
        p.hp--; p.invul = 100; if(p.hp <= 0) p.active = false;
    }

    function draw() {
        ctx.fillStyle = "#0b0f19"; ctx.fillRect(0,0,1100,550);
        frames++;
        if(superTimer > 0) superTimer--; if(ghostTimer > 0) ghostTimer--;

        updatePlayer(players[0], 'ArrowLeft', 'ArrowRight', 'ArrowUp');
        updatePlayer(players[1], 'KeyA', 'KeyD', 'KeyW');
        updatePlayer(players[2], 'KeyV', 'KeyN', 'KeyB');

        ctx.fillStyle = "#1e293b"; platforms.forEach(plat => ctx.fillRect(plat.x, plat.y, plat.w, plat.h));
        ctx.fillStyle = "#ef4444"; spikes.forEach(s => ctx.fillRect(s.x, s.y, s.w, s.h));
        
        // ציור חייזרים (הם נראים כמו מוחות קטנים עכשיו)
        aliens.forEach(a => {
            if(!a.alive) return;
            a.x += a.dir * a.speed; if(a.x > 1050 || a.x < 50) a.dir *= -1;
            ctx.fillStyle = "#a855f7"; ctx.beginPath(); ctx.arc(a.x, a.y, 12, 0, 7); ctx.fill();
            ctx.fillStyle = "#d8b4fe"; ctx.beginPath(); ctx.arc(a.x-3, a.y-2, 4, 0, 7); ctx.fill();
        });

        if(items.every(i => !i.active)) doorActive = true;
        items.forEach(it => {
            if(!it.active) return;
            let colors = { blue: "#38bdf8", pink: "#f472b6", purple: "#a855f7", green: "#4ade80", yellow: "#fbbf24" };
            ctx.fillStyle = colors[it.type]; ctx.beginPath(); ctx.arc(it.x, it.y, 10, 0, 7); ctx.fill();
        });

        if(doorActive) { ctx.fillStyle = "#8b5cf6"; ctx.fillRect(1020, 440, 50, 80); }

        // ציור דמויות האוכל
        players.forEach(p => drawPlayer(p));

        document.getElementById('sc').innerText = totalScore;
        document.getElementById('hp1').innerText = players[0].hp;
        document.getElementById('hp2').innerText = players[1].hp;
        document.getElementById('hp3').innerText = players[2].hp;

        requestAnimationFrame(draw);
    }
    setupLevel(); draw();
</script>
</body>
</html>
