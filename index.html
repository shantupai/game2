<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>ארנב החידות - 5 שלבים</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: Arial, sans-serif; overflow: hidden; text-align: center; }
        canvas { background: #2c3e50; display: block; margin: 20px auto; border: 5px solid #34495e; touch-action: none; }
        #ui { font-size: 24px; margin-top: 10px; }
        #riddle-box {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #ecf0f1; color: #2c3e50; padding: 25px; border-radius: 15px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5); z-index: 100; width: 300px; border: 4px solid #3498db;
        }
        button { width: 100%; padding: 10px; margin: 5px 0; cursor: pointer; font-weight: bold; background: #3498db; color: white; border: none; border-radius: 5px; }
        .info { color: #bdc3c7; font-size: 14px; }
    </style>
</head>
<body>

<div id="ui">שלב: <span id="lvl">1</span>/5 | גזרים: <span id="gz">0</span>/3 | ניקוד: <span id="sc">0</span></div>
<div class="info">חצים: תנועה וטיפוס | רווח: קפיצה / קפיצת קיר</div>

<div id="riddle-box">
    <h3 id="q">חידה...</h3>
    <div id="ans"></div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 800; canvas.height = 500;

    // הגדרות משחק
    let level = 1, score = 0, carrotsCollected = 0, isPaused = false;
    let player = { x: 50, y: 400, w: 30, h: 40, vx: 0, vy: 0, onWall: false, wallDir: 0, faceDir: 1 };
    let platforms = [], carrots = [];
    const keys = {};

    const riddleList = [
        {q: "מה יש לו רגליים אבל לא הולך?", a: ["שולחן", "כלב", "מכונית"], c: 0},
        {q: "מה עולה ולא יורד לעולם?", a: ["בלון", "הגיל שלך", "גשם"], c: 1},
        {q: "מה נרטב כשמייבשים אותו?", a: ["מגבת", "ספוג", "ים"], c: 0},
        {q: "איזה חודש יש בו 28 ימים?", a: ["פברואר", "מרץ", "כולם"], c: 2}
    ];

    function initLevel(num) {
        carrotsCollected = 0;
        player.x = 50; player.y = 400; player.vx = 0; player.vy = 0;
        
        // בניית שלב
        platforms = [
            {x: 0, y: 470, w: 800, h: 30, wall: false}, // רצפה
            {x: 350, y: 100, w: 40, h: 370, wall: true}, // קיר טיפוס
            {x: 600, y: 50, w: 40, h: 350, wall: true}   // קיר טיפוס 2
        ];

        // מדרגות
        platforms.push({x: 150, y: 350, w: 100, h: 15, wall: false});
        platforms.push({x: 500, y: 200, w: 100, h: 15, wall: false});

        // 3 גזרים
        carrots = [
            {x: 180, y: 310, active: true},
            {x: 380, y: 150, active: true},
            {x: 630, y: 80, active: true}
        ];
        updateUI();
    }

    function updateUI() {
        document.getElementById('lvl').innerText = level;
        document.getElementById('gz').innerText = carrotsCollected;
        document.getElementById('sc').innerText = score;
    }

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    function showRiddle() {
        isPaused = true;
        const r = riddleList[Math.floor(Math.random() * riddleList.length)];
        document.getElementById('riddle-box').style.display = 'block';
        document.getElementById('q').innerText = r.q;
        const ansDiv = document.getElementById('ans');
        ansDiv.innerHTML = '';
        
        r.a.forEach((text, i) => {
            const btn = document.createElement('button');
            btn.innerText = text;
            btn.onclick = () => {
                if(i === r.c) { score += 50; carrotsCollected++; }
                document.getElementById('riddle-box').style.display = 'none';
                isPaused = false;
                updateUI();
                requestAnimationFrame(gameLoop);
            };
            ansDiv.appendChild(btn);
        });
    }

    function update() {
        if(isPaused) return;

        // תנועה אופקית
        if(keys['ArrowRight']) { player.vx = 5; player.faceDir = 1; }
        else if(keys['ArrowLeft']) { player.vx = -5; player.faceDir = -1; }
        else { player.vx *= 0.8; }

        // טיפוס או כוח משיכה
        if(player.onWall) {
            player.vy = keys['ArrowUp'] ? -4 : (keys['ArrowDown'] ? 4 : 0);
        } else {
            player.vy += 0.8; // גרביטציה
        }

        if((keys['Space'] || keys['ArrowUp']) && !player.onWall && player.vy === 0.8) {
            player.vy = -13;
        }

        // קפיצת קיר
        if(keys['Space'] && player.onWall) {
            player.vy = -10;
            player.vx = -player.wallDir * 10;
            player.onWall = false;
        }

        player.x += player.vx;
        player.y += player.vy;

        // בדיקת התנגשות
        let nowOnWall = false;
        platforms.forEach(p => {
            if(player.x < p.x + p.w && player.x + player.w > p.x && player.y < p.y + p.h && player.y + player.h > p.y) {
                if(!p.wall) { // רצפה
                    if(player.vy > 0) { player.y = p.y - player.h; player.vy = 0; }
                } else { // קיר
                    nowOnWall = true;
                    player.wallDir = (player.x < p.x) ? 1 : -1;
                    player.vx = 0;
                }
            }
        });
        player.onWall = nowOnWall;

        // גזרים
        carrots.forEach(c => {
            if(c.active && Math.abs(player.x - c.x) < 30 && Math.abs(player.y - c.y) < 30) {
                c.active = false;
                showRiddle();
            }
        });

        // פח אשפה (סוף שלב)
        if(carrotsCollected >= 3 && player.x > 720) {
            if(level < 5) { level++; initLevel(level); }
            else { alert("כל הכבוד! סיימת את המשחק!"); level = 1; initLevel(1); }
        }

        if(player.y > 550) initLevel(level); // נפילה
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // פלטפורמות
        platforms.forEach(p => {
            ctx.fillStyle = p.wall ? "#7f8c8d" : "#34495e";
            ctx.fillRect(p.x, p.y, p.w, p.h);
        });

        // גזרים
        carrots.forEach(c => {
            if(c.active) {
                ctx.fillStyle = "#e67e22"; ctx.fillRect(c.x, c.y, 15, 20);
                ctx.fillStyle = "#27ae60"; ctx.fillRect(c.x + 2, c.y - 5, 10, 5);
            }
        });

        // פח אשפה (הדלת)
        ctx.fillStyle = (carrotsCollected >= 3) ? "#2ecc71" : "#95a5a6";
        ctx.fillRect(740, 400, 45, 70); // פח
        ctx.fillStyle = "#7f8c8d"; ctx.fillRect(735, 395, 55, 8); // מכסה

        // ארנב
        ctx.fillStyle = "white";
        ctx.fillRect(player.x, player.y, player.w, player.h); // גוף
        ctx.fillRect(player.x + 5, player.y - 15, 8, 20); // אוזן
        ctx.fillRect(player.x + 17, player.y - 15, 8, 20); // אוזן
        ctx.fillStyle = "black";
        ctx.fillRect(player.faceDir === 1 ? player.x + 22 : player.x + 4, player.y + 10, 4, 4); // עין
    }

    function gameLoop() {
        if(!isPaused) {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
    }

    initLevel(1);
    gameLoop();
</script>

</body>
</html>
